<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
<marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/></filter>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<rect x="50" y="190" width="220" height="90" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
<text x="160.0" y="217.0" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="600" fill="#172033">
<tspan x="160.0" dy="0">主机 A</tspan>
<tspan x="160.0" dy="23">IP 192.168.1.10</tspan>
<tspan x="160.0" dy="23">MAC AA-AA</tspan>
</text>
<rect x="440" y="190" width="220" height="90" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="550.0" y="217.0" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="600" fill="#172033">
<tspan x="550.0" dy="0">默认网关</tspan>
<tspan x="550.0" dy="23">IP 192.168.1.1</tspan>
<tspan x="550.0" dy="23">MAC RR-RR</tspan>
</text>
<rect x="830" y="190" width="220" height="90" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
<text x="940.0" y="228.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="600" fill="#172033">
<tspan x="940.0" dy="0">远程主机 B</tspan>
<tspan x="940.0" dy="23">IP 203.0.113.8</tspan>
</text>
<line x1="270" y1="235" x2="440" y2="235" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<line x1="660" y1="235" x2="830" y2="235" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<rect x="300" y="55" width="500" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="550.0" y="83.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="600" fill="#172033">
<tspan x="550.0" dy="0">跨网段时，ARP 查询的是默认网关 MAC</tspan>
<tspan x="550.0" dy="23">不是远程主机 B 的 MAC</tspan>
</text>
<path d="M 160 190 C 160 120 550 120 550 190" stroke="#dc2626" stroke-width="2.2" fill="none" marker-end="url(#arrowRed)"/>
<text x="355" y="120" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#dc2626">ARP 请求（广播）</text>
<path d="M 550 280 C 550 350 160 350 160 280" stroke="#059669" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<text x="355" y="350" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#059669">ARP 响应（单播）</text>
<text x="550" y="450" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">IP 目的地址保持为 B；当前以太网帧的目的 MAC 是 RR-RR</text>
</svg>