<text x="425.0" y="368.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
<tspan x="425.0" dy="0">下载资源</tspan>
<tspan x="425.0" dy="23">CSS / JS / 图片</tspan>
</text>
<rect x="45" y="325" width="220" height="100" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
<text x="155.0" y="368.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
