<tspan x="965.0" dy="23">建立可靠字节流</tspan>
</text>
<rect x="855" y="325" width="220" height="100" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
<text x="965.0" y="368.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
<tspan x="965.0" dy="0">HTTP 请求</tspan>
<tspan x="965.0" dy="23">GET / Host / Header</tspan>
</text>
<rect x="585" y="325" width="220" height="100" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="695.0" y="368.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
<tspan x="695.0" dy="0">HTTP 响应</tspan>
<tspan x="695.0" dy="23">状态码 + HTML</tspan>
</text>
