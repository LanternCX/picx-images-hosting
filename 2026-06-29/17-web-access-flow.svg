<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="650" viewBox="0 0 1150 650">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
<marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/></filter>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<rect x="45" y="65" width="220" height="100" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
<text x="155.0" y="108.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
<tspan x="155.0" dy="0">解析 URL</tspan>
<tspan x="155.0" dy="23">协议 / 域名 / 端口 / 路径</tspan>
</text>
<rect x="315" y="65" width="220" height="100" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="425.0" y="108.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
<tspan x="425.0" dy="0">DNS</tspan>
<tspan x="425.0" dy="23">域名 → IP</tspan>
</text>
<rect x="585" y="65" width="220" height="100" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="695.0" y="108.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
<tspan x="695.0" dy="0">ARP</tspan>
<tspan x="695.0" dy="23">下一跳 IP → MAC</tspan>
</text>
<rect x="855" y="65" width="220" height="100" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
<text x="965.0" y="108.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
