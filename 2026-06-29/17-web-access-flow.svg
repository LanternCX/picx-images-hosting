<line x1="965" y1="165" x2="965" y2="325" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<line x1="855" y1="375" x2="805" y2="375" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<line x1="585" y1="375" x2="535" y2="375" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<line x1="315" y1="375" x2="265" y2="375" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<rect x="390" y="520" width="370" height="75" rx="14" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
<text x="575.0" y="551.0" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
<tspan x="575.0" dy="0">HTML 中的外部资源会继续触发请求</tspan>
