<text x="550" y="525" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#172033">服务器端口 67，客户端端口 68；初始阶段常使用广播</text>
