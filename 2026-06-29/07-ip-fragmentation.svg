<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="550" viewBox="0 0 1100 550">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
<marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/></filter>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<rect x="40" y="60" width="240" height="100" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
<text x="160.0" y="92.0" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="600" fill="#172033">
<tspan x="160.0" dy="0">原始 IP 数据报</tspan>
<tspan x="160.0" dy="23">总长 2200 B</tspan>
<tspan x="160.0" dy="23">首部 20 B</tspan>
</text>
<line x1="280" y1="110" x2="345" y2="110" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<rect x="345" y="60" width="220" height="100" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="455.0" y="103.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="600" fill="#172033">
<tspan x="455.0" dy="0">链路 MTU</tspan>
<tspan x="455.0" dy="23">820 B</tspan>
</text>
<line x1="565" y1="110" x2="630" y2="110" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<rect x="640" y="35" width="360" height="120" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
<text x="820.0" y="65.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
<tspan x="820.0" dy="0">分片 1</tspan>
<tspan x="820.0" dy="23">数据 800 B</tspan>
<tspan x="820.0" dy="23">偏移 0</tspan>
<tspan x="820.0" dy="23">MF=1</tspan>
</text>
<rect x="640" y="190" width="360" height="120" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
<text x="820.0" y="220.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
<tspan x="820.0" dy="0">分片 2</tspan>
<tspan x="820.0" dy="23">数据 800 B</tspan>
<tspan x="820.0" dy="23">偏移 100</tspan>
<tspan x="820.0" dy="23">MF=1</tspan>
</text>
<rect x="640" y="345" width="360" height="120" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="820.0" y="375.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
<tspan x="820.0" dy="0">分片 3</tspan>
<tspan x="820.0" dy="23">数据 580 B</tspan>
<tspan x="820.0" dy="23">偏移 200</tspan>
<tspan x="820.0" dy="23">MF=0</tspan>
</text>
<rect x="120" y="300" width="390" height="105" rx="14" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
<text x="315.0" y="334.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
<tspan x="315.0" dy="0">非最后分片数据长度</tspan>
<tspan x="315.0" dy="23">必须为 8 B 的整数倍</tspan>
<tspan x="315.0" dy="23">片偏移单位也是 8 B</tspan>
</text>
<text x="315" y="465" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">800 / 8 = 100，因此偏移依次为 0、100、200</text>
</svg>