<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
<marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/></filter>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<rect x="55" y="65" width="440" height="310" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2" filter="url(#shadow)"/>
<text x="275" y="105" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#172033">无噪声理想信道</text>
<text x="275" y="155" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#172033">奈奎斯特准则</text>
<text x="275" y="205" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="700" fill="#4f46e5">Rmax = 2B log2 V</text>
<text x="275" y="265" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="500" fill="#172033">
<tspan x="275" dy="0">B：带宽</tspan>
<tspan x="275" dy="30">V：码元状态数</tspan>
<tspan x="275" dy="30">限制来自码元间干扰</tspan>
</text>
<rect x="585" y="65" width="440" height="310" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
<text x="805" y="105" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#172033">有随机噪声信道</text>
<text x="805" y="155" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#172033">香农公式</text>
<text x="805" y="205" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="700" fill="#ea580c">C = B log2(1 + S/N)</text>
<text x="805" y="265" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="500" fill="#172033">
<tspan x="805" dy="0">B：带宽</tspan>
<tspan x="805" dy="30">S/N：信噪比</tspan>
<tspan x="805" dy="30">限制来自噪声与带宽</tspan>
</text>
<line x1="495" y1="220" x2="585" y2="220" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="7 6"/>
<text x="540" y="430" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="700" fill="#172033">实际系统的上限同时受码元设计与噪声影响</text>
</svg>