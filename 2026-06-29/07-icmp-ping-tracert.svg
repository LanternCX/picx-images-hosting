<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="540" viewBox="0 0 1100 540">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
<marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
<marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/></filter>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<rect x="45" y="185" width="200" height="85" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
<text x="145.0" y="221.0" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="600" fill="#172033">
<tspan x="145.0" dy="0">源主机</tspan>
<tspan x="145.0" dy="23">TTL / ICMP</tspan>
</text>
<rect x="330" y="185" width="120" height="85" rx="14" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
<text x="390.0" y="232.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="600" fill="#172033">
<tspan x="390.0" dy="0">R1</tspan>
</text>
<rect x="530" y="185" width="120" height="85" rx="14" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
<text x="590.0" y="232.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="600" fill="#172033">
<tspan x="590.0" dy="0">R2</tspan>
</text>
<rect x="730" y="185" width="120" height="85" rx="14" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
<text x="790.0" y="232.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="600" fill="#172033">
<tspan x="790.0" dy="0">R3</tspan>
</text>
<rect x="930" y="185" width="125" height="85" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
<text x="992.5" y="221.0" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="600" fill="#172033">
<tspan x="992.5" dy="0">目标</tspan>
<tspan x="992.5" dy="23">主机</tspan>
</text>
<line x1="245" y1="228" x2="330" y2="228" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<line x1="450" y1="228" x2="530" y2="228" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<line x1="650" y1="228" x2="730" y2="228" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<line x1="850" y1="228" x2="930" y2="228" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<rect x="160" y="55" width="780" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
<text x="550.0" y="83.5" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="600" fill="#172033">
<tspan x="550.0" dy="0">ping：Echo Request 到达目标，目标返回 Echo Reply</tspan>
<tspan x="550.0" dy="23">用于测试连通性和往返时延</tspan>
</text>
<rect x="160" y="345" width="780" height="110" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
<text x="550.0" y="382.0" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033">
<tspan x="550.0" dy="0">tracert / traceroute：逐次把 TTL 设为 1、2、3…</tspan>
<tspan x="550.0" dy="23">TTL 在某路由器减为 0 时，该路由器返回 ICMP Time Exceeded</tspan>
<tspan x="550.0" dy="23">由此得到路径上的每一跳</tspan>
</text>
</svg>