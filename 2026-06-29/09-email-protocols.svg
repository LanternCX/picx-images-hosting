<text x="288" y="195" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700" fill="#172033">SMTP</text>
<line x1="550" y1="220" x2="650" y2="220" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<text x="600" y="195" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700" fill="#172033">SMTP</text>
<line x1="870" y1="220" x2="930" y2="220" stroke="#334155" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<text x="900" y="195" text-anchor="middle" dominant-baseline="middle" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700" fill="#172033">POP3 / IMAP</text>
<rect x="300" y="355" width="500" height="90" rx="14" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
