<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.tiny{font-size:13px}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}
.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}
.line{stroke:#334155;stroke-width:2.2;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:7 6;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="450" y="42" text-anchor="middle" class="title">进程三态模型与合法转换</text><rect x="70" y="190" width="210" height="90" class="accent"/><text x="175.0" y="227.0" text-anchor="middle" dominant-baseline="middle" class="label">就绪态</text><text x="175.0" y="252.0" text-anchor="middle" dominant-baseline="middle" class="small">等待CPU</text><rect x="345" y="70" width="210" height="90" class="good"/><text x="450.0" y="107.0" text-anchor="middle" dominant-baseline="middle" class="label">运行态</text><text x="450.0" y="132.0" text-anchor="middle" dominant-baseline="middle" class="small">正在占用CPU</text><rect x="620" y="190" width="210" height="90" class="warn"/><text x="725.0" y="227.0" text-anchor="middle" dominant-baseline="middle" class="label">阻塞态</text><text x="725.0" y="252.0" text-anchor="middle" dominant-baseline="middle" class="small">等待事件/I/O</text><path d="M280,200 Q315,150 345,130" class="line" marker-end="url(#arrow)"/><text x="292" y="145" text-anchor="middle" class="small">调度</text><path d="M345,155 Q315,220 280,235" class="line" marker-end="url(#arrow)"/><text x="355" y="210" text-anchor="middle" class="small">时间片到 / 被抢占</text><path d="M555,130 Q590,150 620,200" class="line" marker-end="url(#arrow)"/><text x="610" y="145" text-anchor="middle" class="small">等待事件</text><path d="M620,255 L280,255" class="line" marker-end="url(#arrow)"/><text x="450.0" y="248.0" text-anchor="middle" class="small">事件完成</text><text x="450" y="350" text-anchor="middle" class="label">不允许直接转换</text><text x="450" y="382" text-anchor="middle" class="small">就绪 → 阻塞：未运行，不能主动等待；阻塞 → 运行：必须先回到就绪队列</text></svg>