<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">文件系统把名称逐步映射到磁盘设备</text>
<rect x="250" y="78" width="400" height="50" class="accent"/><text x="450" y="110" text-anchor="middle" class="label">文件名和路径</text>
<rect x="250" y="148" width="400" height="50" class="box"/><text x="450" y="180" text-anchor="middle" class="label">目录与文件控制信息</text>
<rect x="250" y="218" width="400" height="50" class="good"/><text x="450" y="250" text-anchor="middle" class="label">逻辑块号</text>
<rect x="250" y="288" width="400" height="50" class="warn"/><text x="450" y="320" text-anchor="middle" class="label">物理盘块号</text>
<rect x="250" y="358" width="400" height="50" class="box"/><text x="450" y="390" text-anchor="middle" class="label">磁盘设备</text>
<path d="M450,128 L450,148" class="line" marker-end="url(#arrow)"/><path d="M450,198 L450,218" class="line" marker-end="url(#arrow)"/><path d="M450,268 L450,288" class="line" marker-end="url(#arrow)"/><path d="M450,338 L450,358" class="line" marker-end="url(#arrow)"/>
</svg>
