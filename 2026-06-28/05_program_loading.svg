<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">程序从源代码到内存运行：编译、链接、装入与重定位</text><rect x="22" y="145" width="156" height="100" rx="12" class="accent"/><text x="100" y="180" text-anchor="middle" class="label">源程序</text><text x="100" y="215" text-anchor="middle" class="tiny">高级语言</text><path d="M178,195 L222,195" class="line" marker-end="url(#arrow)"/><rect x="222" y="145" width="156" height="100" rx="12" class="box"/><text x="300" y="180" text-anchor="middle" class="label">目标模块</text><text x="300" y="215" text-anchor="middle" class="tiny">机器代码片段</text><path d="M378,195 L422,195" class="line" marker-end="url(#arrow)"/><rect x="422" y="145" width="156" height="100" rx="12" class="box"/><text x="500" y="180" text-anchor="middle" class="label">可执行文件</text><text x="500" y="215" text-anchor="middle" class="tiny">完成外部符号链接</text><path d="M578,195 L622,195" class="line" marker-end="url(#arrow)"/><rect x="622" y="145" width="156" height="100" rx="12" class="box"/><text x="700" y="180" text-anchor="middle" class="label">内存映像</text><text x="700" y="215" text-anchor="middle" class="tiny">装入并确定地址</text><path d="M778,195 L822,195" class="line" marker-end="url(#arrow)"/><rect x="822" y="145" width="156" height="100" rx="12" class="accent"/><text x="900" y="180" text-anchor="middle" class="label">CPU 执行</text><text x="900" y="215" text-anchor="middle" class="tiny">按逻辑/物理地址访问</text><text x="200" y="125" text-anchor="middle" class="small">编译</text><text x="400" y="125" text-anchor="middle" class="small">链接</text><text x="600" y="125" text-anchor="middle" class="small">装入</text><text x="800" y="125" text-anchor="middle" class="small">运行时地址转换</text><rect x="200" y="330" width="600" height="100" rx="12" class="warn"/><text x="500" y="360" text-anchor="middle" class="small"><tspan x="500" dy="0">重定位：把程序中的逻辑地址映射到实际内存位置</tspan><tspan x="500" dy="26">静态重定位在装入时完成；动态重定位在运行时由硬件完成</tspan></text><text x="500" y="500" text-anchor="middle" class="small">动态重定位使进程可在内存中移动，也是分页、分段和虚拟存储的基础。</text></svg>