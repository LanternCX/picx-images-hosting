<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">死锁四个必要条件：必须同时成立</text><rect x="120" y="105" width="330" height="130" rx="12" class="accent"/><text x="285" y="152" text-anchor="middle" class="label">互斥</text><text x="285" y="190" text-anchor="middle" class="small">资源一次只能一个进程使用</text><rect x="550" y="105" width="330" height="130" rx="12" class="warn"/><text x="715" y="152" text-anchor="middle" class="label">请求并保持</text><text x="715" y="190" text-anchor="middle" class="small">持有已有资源时继续申请</text><rect x="120" y="305" width="330" height="130" rx="12" class="good"/><text x="285" y="352" text-anchor="middle" class="label">不可剥夺</text><text x="285" y="390" text-anchor="middle" class="small">系统不能强制收回</text><rect x="550" y="305" width="330" height="130" rx="12" class="bad"/><text x="715" y="352" text-anchor="middle" class="label">循环等待</text><text x="715" y="390" text-anchor="middle" class="small">等待关系首尾相接</text><path d="M450,170 L550,170" class="line" marker-end="url(#arrow)"/><path d="M715,235 L715,305" class="line" marker-end="url(#arrow)"/><path d="M550,370 L450,370" class="line" marker-end="url(#arrow)"/><path d="M285,305 L285,235" class="line" marker-end="url(#arrow)"/><text x="500" y="510" text-anchor="middle" class="small">破坏其中任意一个条件，就能从机制上预防死锁；银行家算法则是在条件仍可能成立时避免进入不安全状态。</text></svg>