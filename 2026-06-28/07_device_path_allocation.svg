<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">设备分配：整条 I/O 路径都必须可用</text><rect x="15" y="150" width="150" height="115" rx="12" class="accent"/><text x="90" y="185" text-anchor="middle" class="label">进程</text><text x="90" y="215" text-anchor="middle" class="tiny"><tspan x="90" dy="0">发出逻辑设备请求</tspan></text><path d="M165,207 L210,207" class="line" marker-end="url(#arrow)"/><rect x="210" y="150" width="150" height="115" rx="12" class="box"/><text x="285" y="185" text-anchor="middle" class="label">设备</text><text x="285" y="215" text-anchor="middle" class="tiny"><tspan x="285" dy="0">目标硬件</tspan></text><path d="M360,207 L405,207" class="line" marker-end="url(#arrow)"/><rect x="405" y="150" width="150" height="115" rx="12" class="box"/><text x="480" y="185" text-anchor="middle" class="label">控制器</text><text x="480" y="215" text-anchor="middle" class="tiny"><tspan x="480" dy="0">解释命令并控制设备</tspan></text><path d="M555,207 L600,207" class="line" marker-end="url(#arrow)"/><rect x="600" y="150" width="150" height="115" rx="12" class="box"/><text x="675" y="185" text-anchor="middle" class="label">通道</text><text x="675" y="215" text-anchor="middle" class="tiny"><tspan x="675" dy="0">执行 I/O 程序</tspan></text><path d="M750,207 L795,207" class="line" marker-end="url(#arrow)"/><rect x="795" y="150" width="150" height="115" rx="12" class="accent"/><text x="870" y="185" text-anchor="middle" class="label">主存</text><text x="870" y="215" text-anchor="middle" class="tiny"><tspan x="870" dy="0">数据传输目的地</tspan></text><rect x="170" y="340" width="660" height="85" rx="12" class="warn"/><text x="500" y="373" text-anchor="middle" class="label">只分配“设备”还不够</text><text x="500" y="404" text-anchor="middle" class="small">控制器或通道被占用时，数据路径仍无法建立</text><text x="500" y="500" text-anchor="middle" class="small">实际系统可能共享控制器或通道，但题目判断时要检查请求涉及的所有资源层级。</text></svg>