<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="380" viewBox="0 0 1000 380">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:17px;font-weight:600}.small{font-size:14px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="500" y="42" text-anchor="middle" class="title">一次文件读取 I/O 请求的路径</text>
<rect x="50" y="118" width="120" height="62" class="accent"/><text x="110" y="143" text-anchor="middle" class="label">应用</text><text x="110" y="166" text-anchor="middle" class="small">read()</text>
<rect x="200" y="118" width="120" height="62" class="box"/><text x="260" y="143" text-anchor="middle" class="label">内核</text><text x="260" y="166" text-anchor="middle" class="small">进入</text>
<rect x="350" y="118" width="120" height="62" class="good"/><text x="410" y="143" text-anchor="middle" class="label">文件系统</text><text x="410" y="166" text-anchor="middle" class="small">确定块号</text>
<rect x="500" y="118" width="120" height="62" class="box"/><text x="560" y="143" text-anchor="middle" class="label">设备独立层</text><text x="560" y="166" text-anchor="middle" class="small">选择设备</text>
<rect x="650" y="118" width="120" height="62" class="warn"/><text x="710" y="143" text-anchor="middle" class="label">驱动程序</text><text x="710" y="166" text-anchor="middle" class="small">生成命令</text>
<rect x="800" y="118" width="120" height="62" class="box"/><text x="860" y="143" text-anchor="middle" class="label">控制器</text><text x="860" y="166" text-anchor="middle" class="small">执行传输</text>
<path d="M170,149 L200,149" class="line" marker-end="url(#arrow)"/><path d="M320,149 L350,149" class="line" marker-end="url(#arrow)"/><path d="M470,149 L500,149" class="line" marker-end="url(#arrow)"/><path d="M620,149 L650,149" class="line" marker-end="url(#arrow)"/><path d="M770,149 L800,149" class="line" marker-end="url(#arrow)"/>
<path d="M860,180 C820,255 250,255 210,180" class="line" marker-end="url(#arrow)"/><text x="500" y="278" text-anchor="middle" class="small">完成后产生中断，中断处理程序唤醒等待进程</text>
</svg>
