<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">三级调度：作业进入、内存换入换出、CPU 选择</text><rect x="60" y="160" width="190" height="150" rx="12" class="muted"/><text x="155" y="198" text-anchor="middle" class="label">外存后备队列</text><text x="155" y="232" text-anchor="middle" class="small">尚未进入内存</text><rect x="405" y="110" width="190" height="95" rx="12" class="accent"/><text x="500" y="148" text-anchor="middle" class="label">内存中的就绪队列</text><text x="500" y="178" text-anchor="middle" class="small">等待 CPU</text><rect x="405" y="305" width="190" height="95" rx="12" class="warn"/><text x="500" y="343" text-anchor="middle" class="label">挂起区</text><text x="500" y="373" text-anchor="middle" class="small">暂不参加调度</text><rect x="750" y="160" width="190" height="150" rx="12" class="good"/><text x="845" y="198" text-anchor="middle" class="label">CPU</text><text x="845" y="232" text-anchor="middle" class="small">正在执行的进程</text><path d="M250,205 L405,158" class="line" marker-end="url(#arrow)"/><text x="327.5" y="165" text-anchor="middle" class="tiny">高级调度</text><path d="M595,158 L750,205" class="line" marker-end="url(#arrow)"/><text x="672.5" y="165" text-anchor="middle" class="tiny">低级调度</text><path d="M500,205 L500,305" class="line" marker-end="url(#arrow)"/><text x="610" y="255" text-anchor="middle" class="tiny">中级调度：换出</text><path d="M455,305 L455,245 L430,245 L430,205" class="line" marker-end="url(#arrow)"/><text x="400" y="255" text-anchor="middle" class="tiny">换入</text><text x="500" y="500" text-anchor="middle" class="small">高级调度控制“有多少作业进入系统”；低级调度才决定“下一刻谁使用 CPU”。</text></svg>