<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">银行家算法：一次请求的四道检查</text><rect x="40" y="150" width="200" height="120" rx="12" class="bad"/><text x="140" y="188" text-anchor="middle" class="label">1 合法性</text><text x="140" y="225" text-anchor="middle" class="small">Request ≤ Need</text><path d="M240,210 L280,210" class="line" marker-end="url(#arrow)"/><rect x="280" y="150" width="200" height="120" rx="12" class="warn"/><text x="380" y="188" text-anchor="middle" class="label">2 当前够不够</text><text x="380" y="225" text-anchor="middle" class="small">Request ≤ Available</text><path d="M480,210 L520,210" class="line" marker-end="url(#arrow)"/><rect x="520" y="150" width="200" height="120" rx="12" class="accent"/><text x="620" y="188" text-anchor="middle" class="label">3 试分配</text><text x="620" y="225" text-anchor="middle" class="small">临时修改三张表</text><path d="M720,210 L760,210" class="line" marker-end="url(#arrow)"/><rect x="760" y="150" width="200" height="120" rx="12" class="good"/><text x="860" y="188" text-anchor="middle" class="label">4 安全性检查</text><text x="860" y="225" text-anchor="middle" class="small">能否找到安全序列</text><rect x="225" y="345" width="550" height="90" rx="12" class="muted"/><text x="500" y="377" text-anchor="middle" class="label">任一步失败：拒绝或等待，并撤销试分配</text><text x="500" y="408" text-anchor="middle" class="small">只有安全性检查通过，才真正批准请求</text><text x="500" y="505" text-anchor="middle" class="small">“当前有资源”不等于“分配后仍安全”，所以必须试分配再检查未来完成顺序。</text></svg>