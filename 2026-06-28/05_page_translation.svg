<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="410" viewBox="0 0 1000 410"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.tiny{font-size:13px}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}
.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}
.line{stroke:#334155;stroke-width:2.2;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:7 6;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500" y="42" text-anchor="middle" class="title">分页地址转换：逻辑地址 → 物理地址</text><rect x="45" y="105" width="240" height="90" class="accent"/><text x="165.0" y="142.0" text-anchor="middle" dominant-baseline="middle" class="label">逻辑地址</text><text x="165.0" y="167.0" text-anchor="middle" dominant-baseline="middle" class="small">页号 p | 页内偏移 d</text><rect x="380" y="105" width="240" height="90" class="box"/><text x="500.0" y="142.0" text-anchor="middle" dominant-baseline="middle" class="label">页表 / TLB</text><text x="500.0" y="167.0" text-anchor="middle" dominant-baseline="middle" class="small">查 p 得到页框号 f</text><rect x="715" y="105" width="240" height="90" class="good"/><text x="835.0" y="142.0" text-anchor="middle" dominant-baseline="middle" class="label">物理地址</text><text x="835.0" y="167.0" text-anchor="middle" dominant-baseline="middle" class="small">页框号 f | 页内偏移 d</text><path d="M285,150 L380,150" class="line" marker-end="url(#arrow)"/><text x="332.5" y="143.0" text-anchor="middle" class="small">查页表</text><path d="M620,150 L715,150" class="line" marker-end="url(#arrow)"/><text x="667.5" y="143.0" text-anchor="middle" class="small">拼接</text><text x="500" y="270" text-anchor="middle" class="label">公式：p = ⌊A / L⌋，d = A mod L，PA = f × L + d</text><text x="500" y="315" text-anchor="middle" class="small">例：页大小 4KB，逻辑地址 (0,4)，页0→页框1，则 PA=1×4096+4=4100</text><text x="500" y="360" text-anchor="middle" class="small">无 TLB：查页表一次 + 访问数据一次；段页式通常需段表、页表、数据共三次访问</text></svg>