<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">设备分类：数据单位与共享属性是两条不同维度</text><rect x="60" y="105" width="410" height="330" rx="12" class="accent"/><text x="265" y="140" text-anchor="middle" class="label">按传输单位</text><rect x="105" y="155" width="320" height="60" rx="12" class="box"/><text x="265" y="180" text-anchor="middle" class="label">字符设备</text><text x="265" y="205" text-anchor="middle" class="tiny">键盘、串口、打印机</text><rect x="105" y="245" width="320" height="60" rx="12" class="box"/><text x="265" y="270" text-anchor="middle" class="label">块设备</text><text x="265" y="295" text-anchor="middle" class="tiny">磁盘、SSD，可随机定位</text><rect x="105" y="335" width="320" height="60" rx="12" class="box"/><text x="265" y="360" text-anchor="middle" class="label">网络设备</text><text x="265" y="385" text-anchor="middle" class="tiny">按报文/数据包传输</text><rect x="530" y="105" width="410" height="330" rx="12" class="good"/><text x="735" y="140" text-anchor="middle" class="label">按共享属性</text><rect x="575" y="155" width="320" height="60" rx="12" class="box"/><text x="735" y="180" text-anchor="middle" class="label">独占设备</text><text x="735" y="205" text-anchor="middle" class="tiny">一次只服务一个进程</text><rect x="575" y="245" width="320" height="60" rx="12" class="box"/><text x="735" y="270" text-anchor="middle" class="label">共享设备</text><text x="735" y="295" text-anchor="middle" class="tiny">可交替服务多个进程</text><rect x="575" y="335" width="320" height="60" rx="12" class="box"/><text x="735" y="360" text-anchor="middle" class="label">虚拟设备</text><text x="735" y="385" text-anchor="middle" class="tiny">用软件模拟共享效果</text><text x="500" y="505" text-anchor="middle" class="small">“块设备”不等于“共享设备”；分类维度不同，同一设备可同时属于两个类别。</text></svg>