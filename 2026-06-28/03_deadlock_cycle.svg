<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.tiny{font-size:13px}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}
.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}
.line{stroke:#334155;stroke-width:2.2;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:7 6;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="450" y="42" text-anchor="middle" class="title">死锁的循环等待示意</text><rect x="90" y="125" width="190" height="75" class="accent"/><text x="185.0" y="154.5" text-anchor="middle" dominant-baseline="middle" class="label">进程 P1</text><text x="185.0" y="179.5" text-anchor="middle" dominant-baseline="middle" class="small">持有 R1，申请 R2</text><rect x="620" y="125" width="190" height="75" class="accent"/><text x="715.0" y="154.5" text-anchor="middle" dominant-baseline="middle" class="label">进程 P2</text><text x="715.0" y="179.5" text-anchor="middle" dominant-baseline="middle" class="small">持有 R2，申请 R1</text><rect x="90" y="315" width="190" height="75" class="warn"/><text x="185.0" y="352.5" text-anchor="middle" dominant-baseline="middle" class="label">资源 R1</text><rect x="620" y="315" width="190" height="75" class="warn"/><text x="715.0" y="352.5" text-anchor="middle" dominant-baseline="middle" class="label">资源 R2</text><path d="M185,315 L185,200" class="line" marker-end="url(#arrow)"/><text x="185.0" y="250.5" text-anchor="middle" class="small">已分配</text><path d="M280,162 L620,352" class="line" marker-end="url(#arrow)"/><text x="450.0" y="250.0" text-anchor="middle" class="small">请求</text><path d="M715,315 L715,200" class="line" marker-end="url(#arrow)"/><text x="715.0" y="250.5" text-anchor="middle" class="small">已分配</text><path d="M620,162 L280,352" class="line" marker-end="url(#arrow)"/><text x="450.0" y="250.0" text-anchor="middle" class="small">请求</text><text x="450" y="455" text-anchor="middle" class="label">四个必要条件同时成立：互斥、请求并保持、不可剥夺、循环等待</text></svg>