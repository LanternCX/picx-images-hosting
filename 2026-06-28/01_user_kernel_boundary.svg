<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">用户态、内核态与系统调用边界</text><rect x="60" y="85" width="880" height="150" rx="12" class="accent"/><text x="500" y="115" text-anchor="middle" class="label">用户态：应用只能执行非特权操作</text><rect x="40" y="145" width="160" height="55" rx="12" class="box"/><text x="120" y="178" text-anchor="middle" class="small">应用程序</text><rect x="260" y="145" width="160" height="55" rx="12" class="box"/><text x="340" y="178" text-anchor="middle" class="small">库函数</text><rect x="480" y="145" width="160" height="55" rx="12" class="box"/><text x="560" y="178" text-anchor="middle" class="small">系统调用封装</text><rect x="700" y="145" width="160" height="55" rx="12" class="box"/><text x="780" y="178" text-anchor="middle" class="small">普通计算</text><path d="M60,275 L940,275" class="dash"/><text x="500" y="265" text-anchor="middle" class="label">权限边界</text><rect x="60" y="310" width="880" height="170" rx="12" class="good"/><text x="500" y="342" text-anchor="middle" class="label">内核态：内核代表应用访问受保护资源</text><rect x="75" y="375" width="170" height="58" rx="12" class="box"/><text x="160" y="410" text-anchor="middle" class="small">系统调用处理</text><rect x="295" y="375" width="170" height="58" rx="12" class="box"/><text x="380" y="410" text-anchor="middle" class="small">进程调度</text><rect x="515" y="375" width="170" height="58" rx="12" class="box"/><text x="600" y="410" text-anchor="middle" class="small">内存管理</text><rect x="735" y="375" width="170" height="58" rx="12" class="box"/><text x="820" y="410" text-anchor="middle" class="small">设备驱动</text><path d="M560,200 L560,255 L480,255 L480,310" class="line" marker-end="url(#arrow)"/><text x="520" y="248" text-anchor="middle" class="tiny">陷入指令</text><path d="M600,375 L600,290 L690,290 L690,235" class="line" marker-end="url(#arrow)"/><text x="650" y="282" text-anchor="middle" class="tiny">返回用户态</text><text x="500" y="525" text-anchor="middle" class="small">应用不是“不能做事”，而是不能直接修改会影响整个系统的关键状态。</text></svg>