<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">进程实体：程序、数据与 PCB</text><rect x="70" y="100" width="260" height="330" rx="12" class="accent"/><text x="200" y="137" text-anchor="middle" class="label">进程的地址空间</text><rect x="105" y="175" width="190" height="70" rx="12" class="box"/><text x="200" y="215.0" text-anchor="middle" class="small">程序段：机器指令</text><rect x="105" y="260" width="190" height="65" rx="12" class="box"/><text x="200" y="297.5" text-anchor="middle" class="small">数据段：全局数据/堆</text><rect x="105" y="340" width="190" height="55" rx="12" class="box"/><text x="200" y="372.5" text-anchor="middle" class="small">用户栈</text><rect x="600" y="100" width="300" height="330" rx="12" class="good"/><text x="750" y="137" text-anchor="middle" class="label">PCB：内核中的管理档案</text><rect x="640" y="165" width="220" height="36" rx="8" class="box"/><text x="750" y="189" text-anchor="middle" class="tiny">PID 与进程状态</text><rect x="640" y="213" width="220" height="36" rx="8" class="box"/><text x="750" y="237" text-anchor="middle" class="tiny">程序计数器与寄存器</text><rect x="640" y="261" width="220" height="36" rx="8" class="box"/><text x="750" y="285" text-anchor="middle" class="tiny">优先级与队列指针</text><rect x="640" y="309" width="220" height="36" rx="8" class="box"/><text x="750" y="333" text-anchor="middle" class="tiny">页表/地址空间信息</text><rect x="640" y="357" width="220" height="36" rx="8" class="box"/><text x="750" y="381" text-anchor="middle" class="tiny">打开文件与 I/O 状态</text><path d="M330,260 L600,260" class="line" marker-end="url(#arrow)"/><text x="465.0" y="245" text-anchor="middle" class="tiny">OS 通过 PCB 管理</text><text x="500" y="500" text-anchor="middle" class="small">程序是静态代码；进程是“代码 + 数据 + 当前运行状态”的动态实体。</text></svg>