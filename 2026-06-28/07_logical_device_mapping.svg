<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">逻辑设备名到物理设备的映射</text>
<rect x="210" y="84" width="480" height="58" class="accent"/><text x="450" y="120" text-anchor="middle" class="label">应用请求：打印机</text>
<rect x="210" y="172" width="480" height="58" class="box"/><text x="450" y="208" text-anchor="middle" class="label">操作系统查询逻辑设备表</text>
<rect x="210" y="260" width="480" height="58" class="good"/><text x="450" y="296" text-anchor="middle" class="label">映射到当前可用的物理打印机</text>
<path d="M450,142 L450,172" class="line" marker-end="url(#arrow)"/><path d="M450,230 L450,260" class="line" marker-end="url(#arrow)"/>
</svg>
