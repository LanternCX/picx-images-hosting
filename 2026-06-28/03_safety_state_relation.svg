<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">安全、不安全与死锁的关系</text>
<rect x="80" y="110" width="220" height="86" class="good"/><text x="190" y="142" text-anchor="middle" class="label">安全状态</text><text x="190" y="170" text-anchor="middle" class="small">保证存在完成顺序</text>
<rect x="340" y="110" width="220" height="86" class="warn"/><text x="450" y="142" text-anchor="middle" class="label">不安全状态</text><text x="450" y="170" text-anchor="middle" class="small">未来可能死锁</text>
<rect x="600" y="110" width="220" height="86" class="bad"/><text x="710" y="142" text-anchor="middle" class="label">死锁状态</text><text x="710" y="170" text-anchor="middle" class="small">已经无法推进</text>
<path d="M300,153 L340,153" class="line" marker-end="url(#arrow)"/><path d="M560,153 L600,153" class="line" marker-end="url(#arrow)"/>
<text x="450" y="245" text-anchor="middle" class="small">安全一定不是死锁；死锁一定不安全；不安全不等于已经死锁</text>
</svg>
