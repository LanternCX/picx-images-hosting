<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.tiny{font-size:13px}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}
.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}
.line{stroke:#334155;stroke-width:2.2;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:7 6;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="480" y="42" text-anchor="middle" class="title">生产者—消费者：信号量约束</text><rect x="50" y="145" width="190" height="75" class="accent"/><text x="145.0" y="182.5" text-anchor="middle" dominant-baseline="middle" class="label">生产者</text><rect x="385" y="105" width="190" height="75" class="box"/><text x="480.0" y="134.5" text-anchor="middle" dominant-baseline="middle" class="label">缓冲区</text><text x="480.0" y="159.5" text-anchor="middle" dominant-baseline="middle" class="small">容量 N</text><rect x="720" y="145" width="190" height="75" class="accent"/><text x="815.0" y="182.5" text-anchor="middle" dominant-baseline="middle" class="label">消费者</text><path d="M240,182 L385,142" class="line" marker-end="url(#arrow)"/><text x="312.5" y="155.0" text-anchor="middle" class="small">放入产品</text><path d="M575,142 L720,182" class="line" marker-end="url(#arrow)"/><text x="647.5" y="155.0" text-anchor="middle" class="small">取走产品</text><rect x="285" y="270" width="390" height="110" class="good"/><text x="480.0" y="317.0" text-anchor="middle" dominant-baseline="middle" class="label">信号量初值</text><text x="480.0" y="342.0" text-anchor="middle" dominant-baseline="middle" class="small">empty=N，full=0，mutex=1</text><text x="255" y="425" class="small">生产者：P(empty) → P(mutex) → 放入 → V(mutex) → V(full)</text><text x="255" y="458" class="small">消费者：P(full) → P(mutex) → 取出 → V(mutex) → V(empty)</text><text x="480" y="500" text-anchor="middle" class="small">先申请资源数量信号量，再申请互斥锁；否则可能“拿着锁等待条件”而死锁</text></svg>