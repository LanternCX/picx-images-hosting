<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:17px;font-weight:600}.small{font-size:14px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="480" y="42" text-anchor="middle" class="title">open(path) 建立快速访问连接</text>
<rect x="55" y="115" width="120" height="60" class="accent"/><text x="115" y="151" text-anchor="middle" class="label">open(path)</text>
<rect x="205" y="115" width="120" height="60" class="box"/><text x="265" y="139" text-anchor="middle" class="label">查找</text><text x="265" y="162" text-anchor="middle" class="small">目录项</text>
<rect x="355" y="115" width="120" height="60" class="good"/><text x="415" y="139" text-anchor="middle" class="label">读取</text><text x="415" y="162" text-anchor="middle" class="small">FCB/inode</text>
<rect x="505" y="115" width="120" height="60" class="warn"/><text x="565" y="139" text-anchor="middle" class="label">检查</text><text x="565" y="162" text-anchor="middle" class="small">权限</text>
<rect x="655" y="115" width="120" height="60" class="box"/><text x="715" y="139" text-anchor="middle" class="label">系统</text><text x="715" y="162" text-anchor="middle" class="small">打开表项</text>
<rect x="805" y="115" width="120" height="60" class="accent"/><text x="865" y="139" text-anchor="middle" class="label">进程</text><text x="865" y="162" text-anchor="middle" class="small">打开表项</text>
<path d="M175,145 L205,145" class="line" marker-end="url(#arrow)"/><path d="M325,145 L355,145" class="line" marker-end="url(#arrow)"/><path d="M475,145 L505,145" class="line" marker-end="url(#arrow)"/><path d="M625,145 L655,145" class="line" marker-end="url(#arrow)"/><path d="M775,145 L805,145" class="line" marker-end="url(#arrow)"/>
<rect x="380" y="260" width="200" height="58" class="good"/><text x="480" y="296" text-anchor="middle" class="label">返回文件描述符 fd</text>
<path d="M865,175 C830,235 575,235 500,260" class="line" marker-end="url(#arrow)"/>
</svg>
