<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">安全性算法：模拟一个能让所有进程完成的顺序</text><rect x="55" y="90" width="260" height="115" rx="12" class="accent"/><text x="185" y="125" text-anchor="middle" class="label">初始</text><text x="185" y="158" text-anchor="middle" class="small">Work = Available</text><text x="185" y="184" text-anchor="middle" class="small">所有 Finish = false</text><rect x="370" y="90" width="260" height="115" rx="12" class="warn"/><text x="500" y="125" text-anchor="middle" class="label">寻找可完成进程</text><text x="500" y="158" text-anchor="middle" class="small">Need[i] ≤ Work</text><text x="500" y="184" text-anchor="middle" class="small">说明剩余需求可满足</text><rect x="685" y="90" width="260" height="115" rx="12" class="good"/><text x="815" y="125" text-anchor="middle" class="label">模拟完成并释放</text><text x="815" y="158" text-anchor="middle" class="small">Work += Allocation[i]</text><text x="815" y="184" text-anchor="middle" class="small">Finish[i] = true</text><path d="M315,147 L370,147" class="line" marker-end="url(#arrow)"/><path d="M630,147 L685,147" class="line" marker-end="url(#arrow)"/><path d="M815,205 L815,265 L500,265 L500,205" class="line" marker-end="url(#arrow)"/><text x="660" y="255" text-anchor="middle" class="tiny">继续寻找</text><rect x="120" y="330" width="330" height="100" rx="12" class="good"/><text x="285" y="365" text-anchor="middle" class="label">所有 Finish = true</text><text x="285" y="397" text-anchor="middle" class="small">存在安全序列 → 安全</text><rect x="550" y="330" width="330" height="100" rx="12" class="bad"/><text x="715" y="365" text-anchor="middle" class="label">找不到任何 Need ≤ Work</text><text x="715" y="397" text-anchor="middle" class="small">仍有未完成进程 → 不安全</text><text x="500" y="505" text-anchor="middle" class="small">这里不是真的运行进程，而是在纸面上模拟“谁能先结束、结束后能释放什么”。</text></svg>