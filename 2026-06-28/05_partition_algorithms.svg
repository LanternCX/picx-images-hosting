<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">动态分区算法：同一组空闲区会选择不同位置</text><text x="80" y="100" text-anchor="start" class="small">低地址</text><text x="920" y="100" text-anchor="end" class="small">高地址</text><rect x="100" y="125" width="120" height="65" rx="3" class="muted"/><text x="160.0" y="165" text-anchor="middle" class="tiny">占用</text><rect x="220" y="125" width="90" height="65" rx="3" class="good"/><text x="265.0" y="165" text-anchor="middle" class="tiny">空闲 12</text><rect x="310" y="125" width="110" height="65" rx="3" class="muted"/><text x="365.0" y="165" text-anchor="middle" class="tiny">占用</text><rect x="420" y="125" width="150" height="65" rx="3" class="good"/><text x="495.0" y="165" text-anchor="middle" class="tiny">空闲 20</text><rect x="570" y="125" width="100" height="65" rx="3" class="muted"/><text x="620.0" y="165" text-anchor="middle" class="tiny">占用</text><rect x="670" y="125" width="220" height="65" rx="3" class="good"/><text x="780.0" y="165" text-anchor="middle" class="tiny">空闲 30</text><text x="500" y="225" text-anchor="middle" class="label">申请大小：10</text><rect x="120" y="270" width="250" height="48" rx="12" class="accent"/><text x="245" y="300" text-anchor="middle" class="small">首次适应 FF</text><rect x="410" y="270" width="470" height="48" rx="12" class="box"/><text x="645" y="300" text-anchor="middle" class="small">选择第一个够大的 12</text><rect x="120" y="340" width="250" height="48" rx="12" class="good"/><text x="245" y="370" text-anchor="middle" class="small">最佳适应 BF</text><rect x="410" y="340" width="470" height="48" rx="12" class="box"/><text x="645" y="370" text-anchor="middle" class="small">选择最小够大的 12</text><rect x="120" y="410" width="250" height="48" rx="12" class="warn"/><text x="245" y="440" text-anchor="middle" class="small">最坏适应 WF</text><rect x="410" y="410" width="470" height="48" rx="12" class="box"/><text x="645" y="440" text-anchor="middle" class="small">选择最大的 30</text><text x="500" y="510" text-anchor="middle" class="small">算法名称描述的是“如何选空闲区”，不代表最终一定最好或最坏。</text></svg>