<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">Clock 算法：指针绕环扫描访问位</text><circle cx="500" cy="115" r="58" class="accent"/><text x="500" y="110" text-anchor="middle" class="label">页 A</text><text x="500" y="139" text-anchor="middle" class="small">R=1</text><circle cx="665" cy="205" r="58" class="warn"/><text x="665" y="200" text-anchor="middle" class="label">页 B</text><text x="665" y="229" text-anchor="middle" class="small">R=0</text><circle cx="665" cy="360" r="58" class="good"/><text x="665" y="355" text-anchor="middle" class="label">页 C</text><text x="665" y="384" text-anchor="middle" class="small">R=1</text><circle cx="500" cy="445" r="58" class="accent"/><text x="500" y="440" text-anchor="middle" class="label">页 D</text><text x="500" y="469" text-anchor="middle" class="small">R=1</text><circle cx="335" cy="360" r="58" class="good"/><text x="335" y="355" text-anchor="middle" class="label">页 E</text><text x="335" y="384" text-anchor="middle" class="small">R=0</text><circle cx="335" cy="205" r="58" class="accent"/><text x="335" y="200" text-anchor="middle" class="label">页 F</text><text x="335" y="229" text-anchor="middle" class="small">R=1</text><path d="M557.75,146.5 L607.25,173.5" class="thin" marker-end="url(#arrow)"/><path d="M665.0,259.25 L665.0,305.75" class="thin" marker-end="url(#arrow)"/><path d="M607.25,389.75 L557.75,415.25" class="thin" marker-end="url(#arrow)"/><path d="M442.25,415.25 L392.75,389.75" class="thin" marker-end="url(#arrow)"/><path d="M335.0,305.75 L335.0,259.25" class="thin" marker-end="url(#arrow)"/><path d="M392.75,173.5 L442.25,146.5" class="thin" marker-end="url(#arrow)"/><path d="M805,130 L700,180" class="line" marker-end="url(#arrow)"/><text x="800" y="115" text-anchor="middle" class="tiny">当前指针</text><rect x="50" y="430" width="240" height="75" rx="12" class="muted"/><text x="170" y="458" text-anchor="middle" class="small"><tspan x="170" dy="0">R=1：清 0，继续</tspan><tspan x="170" dy="22">R=0：选择淘汰</tspan></text><text x="500" y="530" text-anchor="middle" class="small">命中页面时也要把它的访问位置 1；否则下一次扫描会错误地认为它最近未被访问。</text></svg>