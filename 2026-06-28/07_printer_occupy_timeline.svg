<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:10}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">直接占有打印机时的低效率</text>
<path d="M95,132 L805,132" class="line" marker-end="url(#arrow)"/><text x="815" y="138" class="small">时间</text>
<rect x="120" y="100" width="250" height="64" class="box"/><text x="245" y="139" text-anchor="middle" class="label">进程计算 10 秒</text>
<rect x="390" y="100" width="120" height="64" class="warn"/><text x="450" y="139" text-anchor="middle" class="label">打印 1 秒</text>
<rect x="530" y="100" width="250" height="64" class="box"/><text x="655" y="139" text-anchor="middle" class="label">再计算 10 秒</text>
<text x="450" y="215" text-anchor="middle" class="small">若打印机一直被进程占有，大部分时间无法服务其他进程</text>
</svg>
