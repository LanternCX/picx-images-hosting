<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">页面置换算法：四种“谁该被淘汰”的判断依据</text><rect x="70" y="95" width="150" height="75" rx="12" class="accent"/><text x="145" y="140" text-anchor="middle" class="label">OPT</text><rect x="260" y="95" width="300" height="75" rx="12" class="box"/><text x="410" y="127" text-anchor="middle" class="label">未来最久不用</text><text x="410" y="153" text-anchor="middle" class="tiny">选择依据</text><rect x="600" y="95" width="330" height="75" rx="12" class="muted"/><text x="765" y="127" text-anchor="middle" class="small">理论最优，无法真实预知</text><text x="765" y="153" text-anchor="middle" class="tiny">特点</text><rect x="70" y="200" width="150" height="75" rx="12" class="warn"/><text x="145" y="245" text-anchor="middle" class="label">FIFO</text><rect x="260" y="200" width="300" height="75" rx="12" class="box"/><text x="410" y="232" text-anchor="middle" class="label">最早进入内存</text><text x="410" y="258" text-anchor="middle" class="tiny">选择依据</text><rect x="600" y="200" width="330" height="75" rx="12" class="muted"/><text x="765" y="232" text-anchor="middle" class="small">实现简单，可能 Belady 异常</text><text x="765" y="258" text-anchor="middle" class="tiny">特点</text><rect x="70" y="305" width="150" height="75" rx="12" class="good"/><text x="145" y="350" text-anchor="middle" class="label">LRU</text><rect x="260" y="305" width="300" height="75" rx="12" class="box"/><text x="410" y="337" text-anchor="middle" class="label">过去最久未使用</text><text x="410" y="363" text-anchor="middle" class="tiny">选择依据</text><rect x="600" y="305" width="330" height="75" rx="12" class="muted"/><text x="765" y="337" text-anchor="middle" class="small">利用历史近似未来</text><text x="765" y="363" text-anchor="middle" class="tiny">特点</text><rect x="70" y="410" width="150" height="75" rx="12" class="box"/><text x="145" y="455" text-anchor="middle" class="label">Clock</text><rect x="260" y="410" width="300" height="75" rx="12" class="box"/><text x="410" y="442" text-anchor="middle" class="label">访问位为 0 优先</text><text x="410" y="468" text-anchor="middle" class="tiny">选择依据</text><rect x="600" y="410" width="330" height="75" rx="12" class="muted"/><text x="765" y="442" text-anchor="middle" class="small">低成本近似 LRU</text><text x="765" y="468" text-anchor="middle" class="tiny">特点</text><text x="500" y="535" text-anchor="middle" class="small">所有算法只在“缺页且没有空闲页框”时才需要选择牺牲页。</text></svg>