<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:8}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:8}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="460" y="42" text-anchor="middle" class="title">紧凑：把零散空闲区合并为大块</text>
<text x="75" y="118" class="label">移动前</text>
<rect x="170" y="90" width="95" height="56" class="box"/><text x="217.5" y="124" text-anchor="middle" class="label">A</text>
<rect x="265" y="90" width="95" height="56" class="warn"/><text x="312.5" y="124" text-anchor="middle" class="small">空闲</text>
<rect x="360" y="90" width="95" height="56" class="box"/><text x="407.5" y="124" text-anchor="middle" class="label">B</text>
<rect x="455" y="90" width="95" height="56" class="warn"/><text x="502.5" y="124" text-anchor="middle" class="small">空闲</text>
<rect x="550" y="90" width="95" height="56" class="box"/><text x="597.5" y="124" text-anchor="middle" class="label">C</text>
<path d="M460,160 L460,190" class="line" marker-end="url(#arrow)"/>
<text x="75" y="236" class="label">移动后</text>
<rect x="170" y="205" width="95" height="56" class="box"/><text x="217.5" y="239" text-anchor="middle" class="label">A</text>
<rect x="265" y="205" width="95" height="56" class="box"/><text x="312.5" y="239" text-anchor="middle" class="label">B</text>
<rect x="360" y="205" width="95" height="56" class="box"/><text x="407.5" y="239" text-anchor="middle" class="label">C</text>
<rect x="455" y="205" width="190" height="56" class="good"/><text x="550" y="239" text-anchor="middle" class="label">大块空闲</text>
</svg>
