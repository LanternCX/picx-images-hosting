<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">内碎片与外碎片：浪费发生在哪里</text><text x="250" y="95" text-anchor="middle" class="label">内碎片</text><text x="750" y="95" text-anchor="middle" class="label">外碎片</text><rect x="85" y="130" width="330" height="230" rx="12" class="accent"/><rect x="125" y="175" width="250" height="110" rx="12" class="good"/><text x="250" y="220" text-anchor="middle" class="label">已分配 8 KB</text><rect x="310" y="175" width="65" height="110" rx="12" class="warn"/><text x="342" y="245" text-anchor="middle" class="tiny">未用</text><text x="250" y="330" text-anchor="middle" class="small">浪费在已分配区域内部</text><rect x="585" y="130" width="330" height="230" rx="12" class="accent"/><rect x="610" y="185" width="80" height="95" rx="3" class="good"/><text x="650.0" y="240" text-anchor="middle" class="tiny">进程</text><rect x="690" y="185" width="45" height="95" rx="3" class="warn"/><text x="712.5" y="240" text-anchor="middle" class="tiny">空闲</text><rect x="735" y="185" width="105" height="95" rx="3" class="good"/><text x="787.5" y="240" text-anchor="middle" class="tiny">进程</text><rect x="840" y="185" width="50" height="95" rx="3" class="warn"/><text x="865.0" y="240" text-anchor="middle" class="tiny">空闲</text><text x="750" y="330" text-anchor="middle" class="small">空闲总量可能够，但被分散</text><text x="500" y="455" text-anchor="middle" class="label">固定分区和分页常见内碎片；动态分区和分段容易产生外碎片。</text></svg>