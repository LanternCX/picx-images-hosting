<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">信号量数值：可用资源数与等待进程数</text><circle cx="190" cy="210" r="92" class="good"/><text x="190" y="205" text-anchor="middle" class="label">S = 3</text><text x="190" y="235" text-anchor="middle" class="small">3 个资源可用</text><rect x="80" y="335" width="220" height="82" rx="12" class="box"/><text x="190" y="368" text-anchor="middle" class="label">无人等待</text><text x="190" y="397" text-anchor="middle" class="tiny">S 表示可用数量</text><circle cx="500" cy="210" r="92" class="warn"/><text x="500" y="205" text-anchor="middle" class="label">S = 0</text><text x="500" y="235" text-anchor="middle" class="small">资源刚好用完</text><rect x="390" y="335" width="220" height="82" rx="12" class="box"/><text x="500" y="368" text-anchor="middle" class="label">无人等待</text><text x="500" y="397" text-anchor="middle" class="tiny">S 表示可用数量</text><circle cx="810" cy="210" r="92" class="bad"/><text x="810" y="205" text-anchor="middle" class="label">S = -2</text><text x="810" y="235" text-anchor="middle" class="small">没有可用资源</text><rect x="700" y="335" width="220" height="82" rx="12" class="box"/><text x="810" y="368" text-anchor="middle" class="label">2 个进程等待</text><text x="810" y="397" text-anchor="middle" class="tiny">|S| 表示等待者数量</text><path d="M282,210 L408,210" class="line" marker-end="url(#arrow)"/><text x="345.0" y="190" text-anchor="middle" class="tiny">执行 P</text><path d="M592,210 L718,210" class="line" marker-end="url(#arrow)"/><text x="655.0" y="190" text-anchor="middle" class="tiny">继续执行 P</text><text x="500" y="500" text-anchor="middle" class="small">P 先减 1；若结果小于 0，当前进程阻塞。V 先加 1；若结果不大于 0，唤醒一个等待者。</text></svg>