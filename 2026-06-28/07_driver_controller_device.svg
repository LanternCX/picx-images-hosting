<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">驱动、控制器和实际设备的关系</text>
<rect x="250" y="82" width="400" height="56" class="accent"/><text x="450" y="117" text-anchor="middle" class="label">应用请求</text>
<rect x="250" y="162" width="400" height="56" class="box"/><text x="450" y="187" text-anchor="middle" class="label">驱动程序</text><text x="450" y="211" text-anchor="middle" class="small">软件</text>
<rect x="250" y="242" width="400" height="56" class="warn"/><text x="450" y="267" text-anchor="middle" class="label">设备控制器</text><text x="450" y="291" text-anchor="middle" class="small">硬件电子部件</text>
<rect x="250" y="322" width="400" height="32" class="good"/><text x="450" y="344" text-anchor="middle" class="small">实际设备：磁盘、打印机等</text>
<path d="M450,138 L450,162" class="line" marker-end="url(#arrow)"/><path d="M450,218 L450,242" class="line" marker-end="url(#arrow)"/><path d="M450,298 L450,322" class="line" marker-end="url(#arrow)"/>
</svg>
