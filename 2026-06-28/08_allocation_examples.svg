<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:10}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:10}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:10}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="500" y="42" text-anchor="middle" class="title">三种文件物理分配示例</text>
<text x="170" y="92" text-anchor="middle" class="label">连续分配</text>
<rect x="60" y="120" width="64" height="48" class="accent"/><text x="92" y="150" text-anchor="middle" class="small">100</text><rect x="124" y="120" width="64" height="48" class="accent"/><text x="156" y="150" text-anchor="middle" class="small">101</text><rect x="188" y="120" width="64" height="48" class="accent"/><text x="220" y="150" text-anchor="middle" class="small">102</text><rect x="252" y="120" width="64" height="48" class="accent"/><text x="284" y="150" text-anchor="middle" class="small">103</text>
<text x="170" y="205" text-anchor="middle" class="small">起始块 = 100；长度 = 5 块</text>
<text x="500" y="92" text-anchor="middle" class="label">链接分配</text>
<rect x="385" y="120" width="54" height="48" class="box"/><text x="412" y="150" text-anchor="middle" class="small">9</text><rect x="460" y="120" width="54" height="48" class="box"/><text x="487" y="150" text-anchor="middle" class="small">16</text><rect x="535" y="120" width="54" height="48" class="box"/><text x="562" y="150" text-anchor="middle" class="small">1</text><rect x="610" y="120" width="54" height="48" class="box"/><text x="637" y="150" text-anchor="middle" class="small">10</text>
<path d="M439,144 L460,144" class="line" marker-end="url(#arrow)"/><path d="M514,144 L535,144" class="line" marker-end="url(#arrow)"/><path d="M589,144 L610,144" class="line" marker-end="url(#arrow)"/>
<text x="820" y="92" text-anchor="middle" class="label">索引分配</text>
<rect x="720" y="120" width="200" height="48" class="warn"/><text x="820" y="150" text-anchor="middle" class="small">索引块：9,16,1,10,25</text>
<rect x="730" y="245" width="54" height="48" class="good"/><text x="757" y="275" text-anchor="middle" class="small">块0</text><rect x="790" y="245" width="54" height="48" class="good"/><text x="817" y="275" text-anchor="middle" class="small">块1</text><rect x="850" y="245" width="54" height="48" class="good"/><text x="877" y="275" text-anchor="middle" class="small">块2</text>
<path d="M760,168 L757,245" class="line" marker-end="url(#arrow)"/><path d="M820,168 L817,245" class="line" marker-end="url(#arrow)"/><path d="M880,168 L877,245" class="line" marker-end="url(#arrow)"/>
</svg>
