<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">多级反馈队列：短作业快速完成，长作业逐级下沉</text><rect x="120" y="110" width="660" height="80" rx="12" class="accent"/><text x="260" y="158" text-anchor="middle" class="label">Q0：最高优先级，时间片 1</text><rect x="470" y="128" width="50" height="44" rx="7" class="box"/><text x="495" y="157" text-anchor="middle" class="tiny">P1</text><rect x="536" y="128" width="50" height="44" rx="7" class="box"/><text x="561" y="157" text-anchor="middle" class="tiny">P2</text><rect x="602" y="128" width="50" height="44" rx="7" class="box"/><text x="627" y="157" text-anchor="middle" class="tiny">P3</text><rect x="668" y="128" width="50" height="44" rx="7" class="box"/><text x="693" y="157" text-anchor="middle" class="tiny">P4</text><rect x="120" y="235" width="660" height="80" rx="12" class="good"/><text x="260" y="283" text-anchor="middle" class="label">Q1：中优先级，时间片 2</text><rect x="470" y="253" width="50" height="44" rx="7" class="box"/><text x="495" y="282" text-anchor="middle" class="tiny">P1</text><rect x="536" y="253" width="50" height="44" rx="7" class="box"/><text x="561" y="282" text-anchor="middle" class="tiny">P2</text><rect x="602" y="253" width="50" height="44" rx="7" class="box"/><text x="627" y="282" text-anchor="middle" class="tiny">P3</text><rect x="668" y="253" width="50" height="44" rx="7" class="box"/><text x="693" y="282" text-anchor="middle" class="tiny">P4</text><rect x="120" y="360" width="660" height="80" rx="12" class="warn"/><text x="260" y="408" text-anchor="middle" class="label">Q2：低优先级，时间片 4</text><rect x="470" y="378" width="50" height="44" rx="7" class="box"/><text x="495" y="407" text-anchor="middle" class="tiny">P1</text><rect x="536" y="378" width="50" height="44" rx="7" class="box"/><text x="561" y="407" text-anchor="middle" class="tiny">P2</text><rect x="602" y="378" width="50" height="44" rx="7" class="box"/><text x="627" y="407" text-anchor="middle" class="tiny">P3</text><rect x="668" y="378" width="50" height="44" rx="7" class="box"/><text x="693" y="407" text-anchor="middle" class="tiny">P4</text><path d="M820,150 L820,235" class="line" marker-end="url(#arrow)"/><text x="890" y="205" text-anchor="middle" class="tiny">时间片用完，下沉</text><path d="M820,275 L820,360" class="line" marker-end="url(#arrow)"/><text x="890" y="330" text-anchor="middle" class="tiny">再次用完，下沉</text><path d="M120,400 L70,400 L70,150 L120,150" class="line" marker-end="url(#arrow)"/><text x="75" y="275" text-anchor="middle" class="tiny">新进程进入最高队列</text><text x="500" y="510" text-anchor="middle" class="small">每次优先运行高队列；交互型/短作业通常很快结束，CPU 密集型长作业逐渐获得更长时间片。</text></svg>