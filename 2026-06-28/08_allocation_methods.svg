<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">文件物理结构：连续、链接与索引分配</text><rect x="35" y="105" width="270" height="330" rx="12" class="accent"/><text x="170" y="145" text-anchor="middle" class="label">连续分配</text><rect x="65" y="185" width="210" height="85" rx="12" class="box"/><text x="170" y="220" text-anchor="middle" class="small"><tspan x="170" dy="0">100 101 102 103</tspan></text><text x="170" y="330" text-anchor="middle" class="small"><tspan x="170" dy="0">顺序/随机访问快</tspan><tspan x="170" dy="26">扩展困难</tspan></text><rect x="365" y="105" width="270" height="330" rx="12" class="warn"/><text x="500" y="145" text-anchor="middle" class="label">链接分配</text><rect x="395" y="185" width="210" height="85" rx="12" class="box"/><text x="500" y="220" text-anchor="middle" class="small"><tspan x="500" dy="0">8</tspan><tspan x="500" dy="22">21</tspan><tspan x="500" dy="22">5</tspan><tspan x="500" dy="22">42</tspan></text><text x="500" y="330" text-anchor="middle" class="small"><tspan x="500" dy="0">易扩展</tspan><tspan x="500" dy="26">随机访问慢</tspan></text><rect x="695" y="105" width="270" height="330" rx="12" class="good"/><text x="830" y="145" text-anchor="middle" class="label">索引分配</text><rect x="725" y="185" width="210" height="85" rx="12" class="box"/><text x="830" y="220" text-anchor="middle" class="small"><tspan x="830" dy="0">索引块</tspan><tspan x="830" dy="22">多个数据块</tspan></text><text x="830" y="330" text-anchor="middle" class="small"><tspan x="830" dy="0">支持随机访问</tspan><tspan x="830" dy="26">需额外索引空间</tspan></text><text x="500" y="510" text-anchor="middle" class="small">选择结构