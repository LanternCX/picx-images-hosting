<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.tiny{font-size:13px}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}
.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}
.line{stroke:#334155;stroke-width:2.2;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:7 6;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="450" y="42" text-anchor="middle" class="title">计算机系统层次与操作系统的位置</text><rect x="180" y="75" width="540" height="62" class="accent"/><text x="450.0" y="98.0" text-anchor="middle" dominant-baseline="middle" class="label">用户/应用程序</text><text x="450.0" y="123.0" text-anchor="middle" dominant-baseline="middle" class="small">通过命令、GUI、系统调用使用服务</text><rect x="180" y="160" width="540" height="62" class="box"/><text x="450.0" y="183.0" text-anchor="middle" dominant-baseline="middle" class="label">其他系统软件</text><text x="450.0" y="208.0" text-anchor="middle" dominant-baseline="middle" class="small">编译器、数据库、工具程序</text><rect x="180" y="245" width="540" height="62" class="good"/><text x="450.0" y="268.0" text-anchor="middle" dominant-baseline="middle" class="label">操作系统</text><text x="450.0" y="293.0" text-anchor="middle" dominant-baseline="middle" class="small">资源管理者 + 用户接口 + 扩充机器</text><rect x="180" y="330" width="540" height="62" class="warn"/><text x="450.0" y="353.0" text-anchor="middle" dominant-baseline="middle" class="label">计算机硬件</text><text x="450.0" y="378.0" text-anchor="middle" dominant-baseline="middle" class="small">CPU、内存、I/O设备、存储器</text><rect x="180" y="415" width="540" height="62" class="box"/><text x="450.0" y="438.0" text-anchor="middle" dominant-baseline="middle" class="label">物理世界</text><text x="450.0" y="463.0" text-anchor="middle" dominant-baseline="middle" class="small">输入、输出、控制对象</text><path d="M450,137 L450,160" class="line" marker-end="url(#arrow)"/><path d="M450,222 L450,245" class="line" marker-end="url(#arrow)"/><path d="M450,307 L450,330" class="line" marker-end="url(#arrow)"/><path d="M450,392 L450,415" class="line" marker-end="url(#arrow)"/></svg>