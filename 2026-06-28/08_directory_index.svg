" class="label">17</text><rect x="790" y="85" width="130" height="48" class="box"/><text x="855.0" y="109.0" text-anchor="middle" dominant-baseline="middle" class="label">数据块 8</text><path d="M680,145 L790,109" class="line" marker-end="url(#arrow)"/><rect x="790" y="145" width="130" height="48" class="box"/><text x="855.0" y="169.0" text-anchor="middle" dominant-baseline="middle" class="label">数据块 21</text><path d="M680,183 L790,169" class="line" marker-end="url(#arrow)"/><rect x="790" y="205" width="130" height="48" class="box"/><text x="855.0" y="229.0" text-anchor="middle" dominant-baseline="middle" class="label">数据块 5</text><path d="M680,221 L790,229" class="line" marker-end="url(#arrow)"/><rect x="790" y="265" width="130" height="48" class="box"/><text x="855.0" y="289.0" text-anchor="middle" dominant-baseline="middle" class="label">数据块 42</text><path d="M680,259 L790,289" class="line" marker-end="url(#arrow)"/><rect x="790" y="325" width="130" height="48" class="box"/><text x="855.0" y="349.0" text-anchor="middle" dominant-baseline="middle" class="label">数据块 17</text><path d="M680,297 L790,349" class="line" marker-end="url(#arrow)"/><text x="720" y="405" text-anchor="middle" class="small">支持随机访问，文件易扩展；代价是索引块空间与额外访问</text></svg>