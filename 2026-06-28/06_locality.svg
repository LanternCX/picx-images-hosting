<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">局部性原理：程序在一段时间内只集中访问一小部分内容</text><text x="250" y="95" text-anchor="middle" class="label">时间局部性</text><text x="750" y="95" text-anchor="middle" class="label">空间局部性</text><circle cx="110" cy="210" r="30" class="muted"/><text x="110" y="216" text-anchor="middle" class="small">0</text><circle cx="170" cy="210" r="30" class="good"/><text x="170" y="216" text-anchor="middle" class="small">A</text><circle cx="230" cy="210" r="30" class="muted"/><text x="230" y="216" text-anchor="middle" class="small">2</text><circle cx="290" cy="210" r="30" class="good"/><text x="290" y="216" text-anchor="middle" class="small">A</text><circle cx="350" cy="210" r="30" class="good"/><text x="350" y="216" text-anchor="middle" class="small">A</text><path d="M110,285 L390,285" class="line" marker-end="url(#arrow)"/><text x="250" y="320" text-anchor="middle" class="small">同一指令/数据反复出现</text><rect x="610" y="160" width="48" height="48" rx="5" class="muted"/><rect x="665" y="160" width="48" height="48" rx="5" class="muted"/><rect x="720" y="160" width="48" height="48" rx="5" class="muted"/><rect x="775" y="160" width="48" height="48" rx="5" class="muted"/><rect x="830" y="160" width="48" height="48" rx="5" class="muted"/><rect x="610" y="215" width="48" height="48" rx="5" class="muted"/><rect x="665" y="215" width="48" height="48" rx="5" class="accent"/><rect x="720" y="215" width="48" height="48" rx="5" class="accent"/><rect x="775" y="215" width="48" height="48" rx="5" class="accent"/><rect x="830" y="215" width="48" height="48" rx="5" class="muted"/><rect x="610" y="270" width="48" height="48" rx="5" class="muted"/><rect x="665" y="270" width="48" height="48" rx="5" class="muted"/><rect x="720" y="270" width="48" height="48" rx="5" class="muted"/><rect x="775" y="270" width="48" height="48" rx="5" class="muted"/><rect x="830" y="270" width="48" height="48" rx="5" class="muted"/><text x="750" y="350" text-anchor="middle" class="small">访问某地址后，附近地址也常被访问</text><rect x="230" y="410" width="540" height="65" rx="12" class="warn"/><text x="500" y="447" text-anchor="middle" class="label">因此只把“当前附近”的页面装入内存，程序仍能高效运行</text></svg>