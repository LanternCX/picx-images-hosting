<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">抖动：页框不足导致“忙着换页，没空计算”</text><text x="200" y="95" text-anchor="middle" class="label">正常状态</text><text x="790" y="95" text-anchor="middle" class="label">抖动状态</text><rect x="70" y="130" width="300" height="270" rx="12" class="good"/><rect x="110" y="165" width="220" height="70" rx="12" class="accent"/><text x="220" y="208" text-anchor="middle" class="label">工作集 4 页</text><rect x="110" y="270" width="220" height="70" rx="12" class="good"/><text x="220" y="313" text-anchor="middle" class="label">分配 6 个页框</text><text x="220" y="380" text-anchor="middle" class="small">大部分访问命中</text><rect x="630" y="130" width="300" height="270" rx="12" class="bad"/><rect x="670" y="165" width="220" height="70" rx="12" class="accent"/><text x="780" y="208" text-anchor="middle" class="label">工作集 6 页</text><rect x="670" y="270" width="220" height="70" rx="12" class="warn"/><text x="780" y="313" text-anchor="middle" class="label">仅分配 3 个页框</text><text x="780" y="380" text-anchor="middle" class="small">页面不断被换入换出</text><path d="M390,265 L610,265" class="line" marker-end="url(#arrow)"/><text x="500.0" y="240" text-anchor="middle" class="tiny">多道程序度过高 / 页框被挤占</text><text x="500" y="480" text-anchor="middle" class="label">解决思路：减少并发进程、按工作集分配页框，或限制局部缺页率。</text></svg>