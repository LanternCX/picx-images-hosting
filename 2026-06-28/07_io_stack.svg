<svg xmlns="http://www.w3.org/2000/svg" width="900" height="485" viewBox="0 0 900 485"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.tiny{font-size:13px}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}
.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}
.line{stroke:#334155;stroke-width:2.2;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:7 6;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="450" y="42" text-anchor="middle" class="title">I/O 软件层次结构</text><rect x="170" y="80" width="560" height="58" class="accent"/><text x="450.0" y="101.0" text-anchor="middle" dominant-baseline="middle" class="label">用户层I/O软件</text><text x="450.0" y="126.0" text-anchor="middle" dominant-baseline="middle" class="small">库函数、格式化I/O</text><rect x="170" y="155" width="560" height="58" class="box"/><text x="450.0" y="176.0" text-anchor="middle" dominant-baseline="middle" class="label">设备独立性软件</text><text x="450.0" y="201.0" text-anchor="middle" dominant-baseline="middle" class="small">统一命名、保护、分配、缓冲</text><rect x="170" y="230" width="560" height="58" class="good"/><text x="450.0" y="251.0" text-anchor="middle" dominant-baseline="middle" class="label">设备驱动程序</text><text x="450.0" y="276.0" text-anchor="middle" dominant-baseline="middle" class="small">把抽象请求翻译为设备命令</text><rect x="170" y="305" width="560" height="58" class="warn"/><text x="450.0" y="326.0" text-anchor="middle" dominant-baseline="middle" class="label">中断处理程序</text><text x="450.0" y="351.0" text-anchor="middle" dominant-baseline="middle" class="small">保存/恢复现场，处理完成中断</text><rect x="170" y="380" width="560" height="58" class="box"/><text x="450.0" y="401.0" text-anchor="middle" dominant-baseline="middle" class="label">设备控制器与硬件</text><text x="450.0" y="426.0" text-anchor="middle" dominant-baseline="middle" class="small">寄存器、DMA、通道、物理设备</text><path d="M450,138 L450,155" class="line" marker-end="url(#arrow)"/><path d="M450,213 L450,230" class="line" marker-end="url(#arrow)"/><path d="M450,288 L450,305" class="line" marker-end="url(#arrow)"/><path d="M450,363 L450,380" class="line" marker-end="url(#arrow)"/></svg>