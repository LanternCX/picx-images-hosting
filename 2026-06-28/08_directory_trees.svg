<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<rect width="100%" height="100%" fill="white"/>
<text x="470" y="42" text-anchor="middle" class="title">二级目录与树形多级目录</text>
<text x="235" y="85" text-anchor="middle" class="label">二级目录</text>
<rect x="145" y="110" width="180" height="50" class="accent"/><text x="235" y="142" text-anchor="middle" class="label">主目录</text>
<path d="M235,160 L160,215" class="line"/><path d="M235,160 L310,215" class="line"/>
<rect x="70" y="215" width="180" height="50" class="box"/><text x="160" y="247" text-anchor="middle" class="label">用户A目录</text>
<rect x="220" y="215" width="180" height="50" class="box"/><text x="310" y="247" text-anchor="middle" class="label">用户B目录</text>
<text x="705" y="85" text-anchor="middle" class="label">树形多级目录</text>
<rect x="650" y="105" width="110" height="46" class="accent"/><text x="705" y="135" text-anchor="middle" class="label">/</text>
<path d="M705,151 L620,210" class="line"/><path d="M705,151 L790,210" class="line"/>
<rect x="565" y="210" width="110" height="46" class="good"/><text x="620" y="240" text-anchor="middle" class="label">home</text>
<rect x="735" y="210" width="110" height="46" class="box"/><text x="790" y="240" text-anchor="middle" class="label">etc</text>
<path d="M620,256 L570,315" class="line"/><path d="M620,256 L670,315" class="line"/>
<rect x="515" y="315" width="110" height="46" class="box"/><text x="570" y="345" text-anchor="middle" class="label">alice</text>
<rect x="615" y="315" width="110" height="46" class="box"/><text x="670" y="345" text-anchor="middle" class="label">bob</text>
</svg>
