<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">抢占式与非抢占式：高优先级进程到达时会怎样</text><text x="80" y="125" text-anchor="start" class="label">非抢占式</text><text x="80" y="315" text-anchor="start" class="label">抢占式</text><path d="M170,135 L930,135" class="line" marker-end="url(#arrow)"/><path d="M170,325 L930,325" class="line" marker-end="url(#arrow)"/><rect x="180" y="95" width="430" height="70" rx="12" class="accent"/><text x="395" y="138" text-anchor="middle" class="label">P1 持续运行直到完成/阻塞</text><rect x="610" y="95" width="220" height="70" rx="12" class="good"/><text x="720" y="138" text-anchor="middle" class="label">P2 后运行</text><path d="M400,75 L400,175" class="dash"/><text x="400" y="70" text-anchor="middle" class="small">P2 到达</text><rect x="180" y="285" width="220" height="70" rx="12" class="accent"/><text x="290" y="328" text-anchor="middle" class="label">P1</text><rect x="400" y="285" width="250" height="70" rx="12" class="good"/><text x="525" y="328" text-anchor="middle" class="label">P2 抢占运行</text><rect x="650" y="285" width="180" height="70" rx="12" class="accent"/><text x="740" y="328" text-anchor="middle" class="label">P1 继续</text><path d="M400,265 L400,365" class="dash"/><text x="400" y="260" text-anchor="middle" class="small">P2 到达</text><text x="500" y="490" text-anchor="middle" class="small">非抢占式减少切换开销；抢占式响应更快，但需要时钟中断和更复杂的调度支持。</text></svg>