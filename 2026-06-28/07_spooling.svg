<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.tiny{font-size:13px}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}
.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}
.line{stroke:#334155;stroke-width:2.2;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:7 6;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500" y="42" text-anchor="middle" class="title">SPOOLing：用共享磁盘模拟独占设备</text><rect x="40" y="120" width="180" height="80" class="accent"/><text x="130.0" y="152.0" text-anchor="middle" dominant-baseline="middle" class="label">多个用户进程</text><text x="130.0" y="177.0" text-anchor="middle" dominant-baseline="middle" class="small">提交打印请求</text><rect x="310" y="95" width="220" height="130" class="box"/><text x="420.0" y="152.0" text-anchor="middle" dominant-baseline="middle" class="label">磁盘井</text><text x="420.0" y="177.0" text-anchor="middle" dominant-baseline="middle" class="small">输入井/输出井 + 队列</text><rect x="620" y="120" width="160" height="80" class="good"/><text x="700.0" y="152.0" text-anchor="middle" dominant-baseline="middle" class="label">守护进程</text><text x="700.0" y="177.0" text-anchor="middle" dominant-baseline="middle" class="small">按队列取任务</text><rect x="850" y="120" width="110" height="80" class="warn"/><text x="905.0" y="152.0" text-anchor="middle" dominant-baseline="middle" class="label">打印机</text><text x="905.0" y="177.0" text-anchor="middle" dominant-baseline="middle" class="small">独占设备</text><path d="M220,160 L310,160" class="line" marker-end="url(#arrow)"/><text x="265.0" y="153.0" text-anchor="middle" class="small">快速写盘</text><path d="M530,160 L620,160" class="line" marker-end="url(#arrow)"/><text x="575.0" y="153.0" text-anchor="middle" class="small">排队调度</text><path d="M780,160 L850,160" class="line" marker-end="url(#arrow)"/><text x="815.0" y="153.0" text-anchor="middle" class="small">串行输出</text><text x="500" y="310" text-anchor="middle" class="label">效果：提高设备利用率，让多个进程“逻辑上同时拥有”打印机</text><text x="500" y="350" text-anchor="middle" class="small">SPOOLing 本身不保证消除所有设备死锁；虚拟设备的关键机制是磁盘缓冲与后台进程，而不是逻辑设备表</text></svg>