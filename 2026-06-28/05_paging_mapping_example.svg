<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:10}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:10}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:10}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">分页：逻辑页可映射到不连续页框</text>
<text x="195" y="95" text-anchor="middle" class="label">进程逻辑页</text><text x="705" y="95" text-anchor="middle" class="label">物理页框</text>
<rect x="95" y="125" width="95" height="56" class="accent"/><text x="142.5" y="160" text-anchor="middle" class="label">页0</text>
<rect x="195" y="125" width="95" height="56" class="accent"/><text x="242.5" y="160" text-anchor="middle" class="label">页1</text>
<rect x="295" y="125" width="95" height="56" class="accent"/><text x="342.5" y="160" text-anchor="middle" class="label">页2</text>
<rect x="560" y="125" width="95" height="56" class="box"/><text x="607.5" y="160" text-anchor="middle" class="label">框5</text>
<rect x="660" y="125" width="95" height="56" class="good"/><text x="707.5" y="160" text-anchor="middle" class="label">框1</text>
<rect x="760" y="125" width="95" height="56" class="warn"/><text x="807.5" y="160" text-anchor="middle" class="label">框8</text>
<path d="M142,181 C230,260 500,260 607,181" class="line" marker-end="url(#arrow)"/>
<path d="M242,181 C310,235 620,235 707,181" class="line" marker-end="url(#arrow)"/>
<path d="M342,181 C420,210 710,210 807,181" class="line" marker-end="url(#arrow)"/>
<text x="450" y="300" text-anchor="middle" class="small">进程整体不必连续，只要每个页框内部连续</text>
</svg>
