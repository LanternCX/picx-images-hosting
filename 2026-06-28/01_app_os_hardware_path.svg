<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">应用通过操作系统使用硬件</text>
<rect x="240" y="78" width="420" height="54" class="accent"/><text x="450" y="112" text-anchor="middle" class="label">用户</text>
<rect x="240" y="158" width="420" height="54" class="box"/><text x="450" y="192" text-anchor="middle" class="label">应用程序</text>
<rect x="240" y="238" width="420" height="54" class="good"/><text x="450" y="272" text-anchor="middle" class="label">操作系统</text>
<rect x="180" y="318" width="540" height="54" class="warn"/><text x="450" y="352" text-anchor="middle" class="label">CPU / 内存 / 磁盘 / I/O 设备</text>
<path d="M450,132 L450,158" class="line" marker-end="url(#arrow)"/>
<path d="M450,212 L450,238" class="line" marker-end="url(#arrow)"/>
<path d="M450,292 L450,318" class="line" marker-end="url(#arrow)"/>
<text x="570" y="232" class="small">系统调用</text>
<text x="570" y="312" class="small">驱动程序与硬件控制</text>
</svg>
