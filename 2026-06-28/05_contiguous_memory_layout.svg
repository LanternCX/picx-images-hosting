<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<rect width="100%" height="100%" fill="white"/>
<text x="360" y="42" text-anchor="middle" class="title">连续分配中的内存布局</text>
<text x="175" y="105" text-anchor="middle" class="small">低地址</text><text x="175" y="450" text-anchor="middle" class="small">高地址</text>
<rect x="230" y="85" width="260" height="78" class="accent"/><text x="360" y="132" text-anchor="middle" class="label">操作系统</text>
<rect x="230" y="163" width="260" height="78" class="good"/><text x="360" y="210" text-anchor="middle" class="label">进程 A</text>
<rect x="230" y="241" width="260" height="78" class="box"/><text x="360" y="288" text-anchor="middle" class="label">进程 B</text>
<rect x="230" y="319" width="260" height="78" class="warn"/><text x="360" y="366" text-anchor="middle" class="label">空闲区</text>
<text x="525" y="209" class="small">连续区域</text><text x="525" y="287" class="small">连续区域</text>
</svg>
