<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">进程切换：保存 A 的现场，恢复 B 的现场</text><rect x="65" y="110" width="250" height="320" rx="12" class="accent"/><text x="190" y="145" text-anchor="middle" class="label">进程 A</text><rect x="105" y="165" width="170" height="42" rx="12" class="box"/><text x="190" y="192" text-anchor="middle" class="small">PC = 0x1200</text><rect x="105" y="220" width="170" height="42" rx="12" class="box"/><text x="190" y="247" text-anchor="middle" class="small">寄存器 R1 = 8</text><rect x="105" y="275" width="170" height="42" rx="12" class="box"/><text x="190" y="302" text-anchor="middle" class="small">栈指针 SP</text><rect x="105" y="330" width="170" height="42" rx="12" class="box"/><text x="190" y="357" text-anchor="middle" class="small">状态：运行</text><rect x="685" y="110" width="250" height="320" rx="12" class="good"/><text x="810" y="145" text-anchor="middle" class="label">进程 B</text><rect x="725" y="165" width="170" height="42" rx="12" class="box"/><text x="810" y="192" text-anchor="middle" class="small">PC = 0x8400</text><rect x="725" y="220" width="170" height="42" rx="12" class="box"/><text x="810" y="247" text-anchor="middle" class="small">寄存器 R1 = 21</text><rect x="725" y="275" width="170" height="42" rx="12" class="box"/><text x="810" y="302" text-anchor="middle" class="small">栈指针 SP</text><rect x="725" y="330" width="170" height="42" rx="12" class="box"/><text x="810" y="357" text-anchor="middle" class="small">状态：就绪</text><rect x="390" y="120" width="220" height="120" rx="12" class="warn"/><text x="500" y="155" text-anchor="middle" class="label">保存 A 上下文</text><text x="500" y="190" text-anchor="middle" class="small">写入 PCB / 内核栈</text><rect x="390" y="300" width="220" height="120" rx="12" class="good"/><text x="500" y="335" text-anchor="middle" class="label">恢复 B 上下文</text><text x="500" y="370" text-anchor="middle" class="small">从 PCB / 内核栈读出</text><path d="M315,230 L390,180" class="line" marker-end="url(#arrow)"/><path d="M610,360 L685,250" class="line" marker-end="url(#arrow)"/><path d="M500,240 L500,300" class="line" marker-end="url(#arrow)"/><text x="575" y="276" text-anchor="middle" class="tiny">调度器选择 B</text><text x="500" y="500" text-anchor="middle" class="small">模式切换可能仍是同一进程；进程切换一定需要更完整的上下文保存与恢复。</text></svg>