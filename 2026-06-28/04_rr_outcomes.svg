<svg xmlns="http://www.w3.org/2000/svg" width="900" height="330" viewBox="0 0 900 330">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">时间片轮转：队首进程运行一个时间片</text>
<rect x="330" y="82" width="240" height="60" class="accent"/><text x="450" y="119" text-anchor="middle" class="label">队首进程运行 q</text>
<rect x="80" y="220" width="210" height="60" class="good"/><text x="185" y="256" text-anchor="middle" class="label">已完成：退出</text>
<rect x="345" y="220" width="210" height="60" class="warn"/><text x="450" y="256" text-anchor="middle" class="label">等待 I/O：阻塞</text>
<rect x="610" y="220" width="210" height="60" class="box"/><text x="715" y="246" text-anchor="middle" class="label">时间片用完</text><text x="715" y="270" text-anchor="middle" class="small">回到就绪队尾</text>
<path d="M410,142 C300,175 230,190 185,220" class="line" marker-end="url(#arrow)"/><path d="M450,142 L450,220" class="line" marker-end="url(#arrow)"/><path d="M490,142 C600,175 670,190 715,220" class="line" marker-end="url(#arrow)"/>
</svg>
