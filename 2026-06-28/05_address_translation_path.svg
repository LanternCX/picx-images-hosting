<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">逻辑地址到物理内存的转换路径</text>
<rect x="95" y="115" width="220" height="70" class="accent"/><text x="205" y="144" text-anchor="middle" class="label">程序发出</text><text x="205" y="170" text-anchor="middle" class="small">逻辑地址</text>
<rect x="340" y="115" width="220" height="70" class="box"/><text x="450" y="144" text-anchor="middle" class="label">MMU / 地址转换机构</text><text x="450" y="170" text-anchor="middle" class="small">按页表、段表或基址转换</text>
<rect x="585" y="115" width="220" height="70" class="good"/><text x="695" y="144" text-anchor="middle" class="label">访问</text><text x="695" y="170" text-anchor="middle" class="small">物理内存</text>
<path d="M315,150 L340,150" class="line" marker-end="url(#arrow)"/><path d="M560,150 L585,150" class="line" marker-end="url(#arrow)"/>
</svg>
