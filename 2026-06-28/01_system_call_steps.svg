<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">系统调用 read() 的典型路径</text>
<rect x="230" y="76" width="440" height="52" class="accent"/><text x="450" y="109" text-anchor="middle" class="label">应用调用 read()</text>
<rect x="230" y="154" width="440" height="52" class="box"/><text x="450" y="187" text-anchor="middle" class="label">库函数整理参数</text>
<rect x="230" y="232" width="440" height="52" class="warn"/><text x="450" y="265" text-anchor="middle" class="label">执行陷入指令，进入内核态</text>
<rect x="230" y="310" width="440" height="52" class="good"/><text x="450" y="343" text-anchor="middle" class="label">内核检查权限并完成读取</text>
<rect x="230" y="388" width="440" height="52" class="accent"/><text x="450" y="421" text-anchor="middle" class="label">返回用户态，应用继续执行</text>
<path d="M450,128 L450,154" class="line" marker-end="url(#arrow)"/><path d="M450,206 L450,232" class="line" marker-end="url(#arrow)"/><path d="M450,284 L450,310" class="line" marker-end="url(#arrow)"/><path d="M450,362 L450,388" class="line" marker-end="url(#arrow)"/>
<text x="720" y="265" class="small">权限边界</text>
</svg>
