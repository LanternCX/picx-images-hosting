<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="330" viewBox="0 0 1000 330">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:14px}.tiny{font-size:13px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:10}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:10}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:10}</style>
<rect width="100%" height="100%" fill="white"/>
<text x="500" y="42" text-anchor="middle" class="title">抢占式优先级调度示例甘特图</text>
<text x="500" y="78" text-anchor="middle" class="small">优先级数值越小越高；新进程到达时可能抢占当前进程</text>
<rect x="60" y="135" width="45" height="56" class="accent"/><text x="82.5" y="169" text-anchor="middle" class="label">P0</text><text x="60" y="213" text-anchor="middle" class="tiny">0</text>
<rect x="105" y="135" width="22.5" height="56" class="box"/><text x="116.25" y="169" text-anchor="middle" class="small">P2</text><text x="105" y="213" text-anchor="middle" class="tiny">10</text>
<rect x="127.5" y="135" width="45" height="56" class="warn"/><text x="150" y="169" text-anchor="middle" class="label">P3</text><text x="127.5" y="213" text-anchor="middle" class="tiny">15</text>
<rect x="172.5" y="135" width="67.5" height="56" class="box"/><text x="206.25" y="169" text-anchor="middle" class="label">P2</text><text x="172.5" y="213" text-anchor="middle" class="tiny">25</text>
<rect x="240" y="135" width="405" height="56" class="accent"/><text x="442.5" y="169" text-anchor="middle" class="label">P0</text><text x="240" y="213" text-anchor="middle" class="tiny">40</text>
<rect x="645" y="135" width="270" height="56" class="good"/><text x="780" y="169" text-anchor="middle" class="label">P1</text><text x="645" y="213" text-anchor="middle" class="tiny">130</text><text x="915" y="213" text-anchor="middle" class="tiny">190</text>
<text x="500" y="270" text-anchor="middle" class="small">运行顺序：P0 → P2 → P3 → P2 → P0 → P1</text>
</svg>
