<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <style>
    text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
    .title{font-size:26px;font-weight:700}
    .label{font-size:18px;font-weight:700}
    .small{font-size:15px}
    .tiny{font-size:13px}
    .proc{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}
    .res{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}
    .safe{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}
    .note{fill:#f8fafc;stroke:#334155;stroke-width:1.6;rx:10}
    .edge{stroke:#334155;stroke-width:2.2;fill:none}
    .req{stroke:#dc2626;stroke-width:2.4;fill:none}
    .alloc{stroke:#2563eb;stroke-width:2.4;fill:none}
    .dash{stroke:#64748b;stroke-width:1.8;stroke-dasharray:7 6;fill:none}
  </style>
  <defs>
    <marker id="arrowDark" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrowReq" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowAlloc" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <text x="490" y="42" text-anchor="middle" class="title">资源分配图：请求边、分配边与环路</text>

  <circle cx="170" cy="155" r="46" class="proc"/>
  <text x="170" y="160" text-anchor="middle" class="label">P1</text>
  <rect x="330" y="112" width="120" height="86" class="res"/>
  <text x="390" y="142" text-anchor="middle" class="label">R1</text>
  <circle cx="370" cy="170" r="7" fill="#ea580c"/>
  <circle cx="410" cy="170" r="7" fill="#ea580c"/>

  <path d="M216,155 C260,155 285,155 330,155" class="req" marker-end="url(#arrowReq)"/>
  <text x="272" y="140" text-anchor="middle" class="small" fill="#dc2626">请求边</text>
  <text x="272" y="162" text-anchor="middle" class="tiny">P1 申请 R1</text>

  <path d="M390,198 C390,255 340,286 275,286" class="alloc" marker-end="url(#arrowAlloc)"/>
  <circle cx="230" cy="286" r="46" class="proc"/>
  <text x="230" y="291" text-anchor="middle" class="label">P2</text>
  <text x="335" y="244" text-anchor="middle" class="small" fill="#2563eb">分配边：R1 → P2</text>

  <rect x="590" y="112" width="120" height="86" class="res"/>
  <text x="650" y="142" text-anchor="middle" class="label">R2</text>
  <circle cx="650" cy="170" r="7" fill="#ea580c"/>
  <circle cx="810" cy="155" r="46" class="proc"/>
  <text x="810" y="160" text-anchor="middle" class="label">P3</text>
  <path d="M710,155 C735,155 745,155 764,155" class="alloc" marker-end="url(#arrowAlloc)"/>
  <text x="738" y="135" text-anchor="middle" class="small" fill="#2563eb">已分配</text>

  <rect x="120" y="378" width="740" height="128" class="note"/>
  <text x="145" y="409" class="label">读图规则</text>
  <text x="145" y="438" class="small">1. 进程画圆，资源画框；资源框里的小圆点表示该类资源有几个实例。</text>
  <text x="145" y="466" class="small">2. P -> R 是请求边；R -> P 是分配边。</text>
  <text x="145" y="494" class="small">3. 无环一定无死锁；单实例资源有环一定死锁；多实例资源有环只说明可能死锁。</text>

  <circle cx="605" cy="292" r="34" class="proc"/>
  <text x="605" y="297" text-anchor="middle" class="label">P4</text>
  <rect x="720" y="258" width="92" height="68" class="res"/>
  <text x="766" y="286" text-anchor="middle" class="label">R3</text>
  <circle cx="766" cy="307" r="6" fill="#ea580c"/>
  <path d="M639,292 C665,292 690,292 720,292" class="req" marker-end="url(#arrowReq)"/>
  <path d="M766,326 C735,365 650,365 615,326" class="alloc" marker-end="url(#arrowAlloc)"/>
  <rect x="642" y="334" width="136" height="24" rx="5" fill="white"/><text x="710" y="351" text-anchor="middle" class="small">单实例环路</text>
</svg>
