<svg xmlns="http://www.w3.org/2000/svg" width="900" height="270" viewBox="0 0 900 270">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">临界区代码的规范结构</text>
<rect x="75" y="115" width="165" height="62" class="accent"/><text x="157.5" y="139" text-anchor="middle" class="label">进入区</text><text x="157.5" y="162" text-anchor="middle" class="small">申请进入</text>
<rect x="270" y="115" width="165" height="62" class="warn"/><text x="352.5" y="139" text-anchor="middle" class="label">临界区</text><text x="352.5" y="162" text-anchor="middle" class="small">访问共享资源</text>
<rect x="465" y="115" width="165" height="62" class="good"/><text x="547.5" y="139" text-anchor="middle" class="label">退出区</text><text x="547.5" y="162" text-anchor="middle" class="small">释放使用权</text>
<rect x="660" y="115" width="165" height="62" class="box"/><text x="742.5" y="139" text-anchor="middle" class="label">剩余区</text><text x="742.5" y="162" text-anchor="middle" class="small">执行其他代码</text>
<path d="M240,146 L270,146" class="line" marker-end="url(#arrow)"/><path d="M435,146 L465,146" class="line" marker-end="url(#arrow)"/><path d="M630,146 L660,146" class="line" marker-end="url(#arrow)"/>
</svg>
