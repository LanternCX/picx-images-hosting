<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">单处理器系统中，CPU、DMA/通道和设备仍可并行</text><text x="60" y="120" text-anchor="start" class="label">时间</text><path d="M125,115 L940,115" class="line" marker-end="url(#arrow)"/><text x="70" y="208" text-anchor="middle" class="label">CPU</text><rect x="180" y="180" width="230" height="55" rx="3" class="accent"/><text x="295.0" y="214" text-anchor="middle" class="tiny">运行进程 A</text><rect x="410" y="180" width="220" height="55" rx="3" class="good"/><text x="520.0" y="214" text-anchor="middle" class="tiny">运行进程 B</text><rect x="630" y="180" width="100" height="55" rx="3" class="warn"/><text x="680.0" y="214" text-anchor="middle" class="tiny">处理中断</text><rect x="730" y="180" width="170" height="55" rx="3" class="good"/><text x="815.0" y="214" text-anchor="middle" class="tiny">继续运行 B</text><text x="70" y="328" text-anchor="middle" class="label">DMA/通道</text><rect x="180" y="300" width="120" height="55" rx="3" class="muted"/><text x="240.0" y="334" text-anchor="middle" class="tiny">空闲</text><rect x="300" y="300" width="330" height="55" rx="3" class="accent"/><text x="465.0" y="334" text-anchor="middle" class="tiny">搬运磁盘数据</text><rect x="630" y="300" width="270" height="55" rx="3" class="muted"/><text x="765.0" y="334" text-anchor="middle" class="tiny">空闲</text><text x="70" y="448" text-anchor="middle" class="label">磁盘</text><rect x="180" y="420" width="450" height="55" rx="3" class="warn"/><text x="405.0" y="454" text-anchor="middle" class="tiny">寻道/传输</text><rect x="630" y="420" width="100" height="55" rx="3" class="good"/><text x="680.0" y="454" text-anchor="middle" class="tiny">完成</text><rect x="730" y="420" width="170" height="55" rx="3" class="warn"/><text x="815.0" y="454" text-anchor="middle" class="tiny">下一请求</text><text x="500" y="515" text-anchor="middle" class="small">并行的是不同硬件部件的工作，不是单个 CPU 同时执行两个进程的指令。</text></svg>