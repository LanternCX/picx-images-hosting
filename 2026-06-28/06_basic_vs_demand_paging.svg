<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">基本分页与请求分页：运行前全部装入，还是访问时再调入</text><text x="250" y="90" text-anchor="middle" class="label">基本分页</text><text x="750" y="90" text-anchor="middle" class="label">请求分页</text><rect x="80" y="125" width="340" height="250" rx="12" class="accent"/><rect x="125" y="150" width="250" height="34" rx="12" class="good"/><text x="250" y="173" text-anchor="middle" class="tiny">页面 0：已在内存</text><rect x="125" y="192" width="250" height="34" rx="12" class="good"/><text x="250" y="215" text-anchor="middle" class="tiny">页面 1：已在内存</text><rect x="125" y="234" width="250" height="34" rx="12" class="good"/><text x="250" y="257" text-anchor="middle" class="tiny">页面 2：已在内存</text><rect x="125" y="276" width="250" height="34" rx="12" class="good"/><text x="250" y="299" text-anchor="middle" class="tiny">页面 3：已在内存</text><rect x="125" y="318" width="250" height="34" rx="12" class="good"/><text x="250" y="341" text-anchor="middle" class="tiny">页面 4：已在内存</text><text x="250" y="410" text-anchor="middle" class="small">运行前通常全部装入</text><rect x="580" y="125" width="340" height="250" rx="12" class="accent"/><rect x="625" y="150" width="250" height="34" rx="12" class="good"/><text x="750" y="173" text-anchor="middle" class="tiny">页面 0：在内存</text><rect x="625" y="192" width="250" height="34" rx="12" class="muted"/><text x="750" y="215" text-anchor="middle" class="tiny">页面 1：在外存</text><rect x="625" y="234" width="250" height="34" rx="12" class="good"/><text x="750" y="257" text-anchor="middle" class="tiny">页面 2：在内存</text><rect x="625" y="276" width="250" height="34" rx="12" class="muted"/><text x="750" y="299" text-anchor="middle" class="tiny">页面 3：在外存</text><rect x="625" y="318" width="250" height="34" rx="12" class="muted"/><text x="750" y="341" text-anchor="middle" class="tiny">页面 4：在外存</text><text x="750" y="410" text-anchor="middle" class="small">访问缺失页时触发缺页中断</text><text x="500" y="500" text-anchor="middle" class="small">请求分页允许进程逻辑空间大于当前物理内存，但需要页表状态位、缺页处理与页面置换。</text></svg>