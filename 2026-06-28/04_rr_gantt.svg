xt><text x="500" y="213" text-anchor="middle" class="tiny">7</text><rect x="565" y="135" width="65" height="54" class="box"/><text x="597.5" y="162.0" text-anchor="middle" dominant-baseline="middle" class="label">P1</text><text x="565" y="213" text-anchor="middle" class="tiny">8</text><rect x="630" y="135" width="65" height="54" class="good"/><text x="662.5" y="162.0" text-anchor="middle" dominant-baseline="middle" class="label">P5</text><text x="630" y="213" text-anchor="middle" class="tiny">9</text><rect x="695" y="135" width="65" height="54" class="box"/><text x="727.5" y="162.0" text-anchor="middle" dominant-baseline="middle" class="label">P1</text><text x="695" y="213" text-anchor="middle" class="tiny">10</text><rect x="760" y="135" width="65" height="54" class="good"/><text x="792.5" y="162.0" text-anchor="middle" dominant-baseline="middle" class="label">P5</text><text x="760" y="213" text-anchor="middle" class="tiny">11</text><rect x="825" y="135" width="65" height="54" class="box"/><text x="857.5" y="162.0" text-anchor="middle" dominant-baseline="middle" class="label">P1</text><text x="825" y="213" text-anchor="middle" class="tiny">12</text><rect x="890" y="135" width="65" height="54" class="good"/><text x="922.5" y="162.0" text-anchor="middle" dominant-baseline="middle" class="label">P5</text><text x="890" y="213" text-anchor="middle" class="tiny">13</text><text x="955" y="213" text-anchor="middle" class="tiny">14</text><text x="500" y="290" text-anchor="middle" class="small">P2 在 t=2 完成，周转时间最短；P5 在 t=14 完成，周转时间为 14</text><text x="500" y="325" text-anchor="middle" class="small">RR 的关键：按队列循环，每次最多运行一个时间片，未完成则回到队尾</text></svg>