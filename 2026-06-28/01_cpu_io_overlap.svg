<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">多道程序如何让 CPU 与 I/O 重叠工作</text><text x="80" y="85" text-anchor="start" class="label">时间</text><path d="M130,80 L920,80" class="line" marker-end="url(#arrow)"/><text x="75" y="155" text-anchor="middle" class="label">程序 A</text><text x="75" y="245" text-anchor="middle" class="label">程序 B</text><text x="75" y="335" text-anchor="middle" class="label">CPU</text><text x="75" y="425" text-anchor="middle" class="label">磁盘</text><rect x="150" y="120" width="190" height="52" rx="12" class="accent"/><text x="245" y="152" text-anchor="middle" class="label">A：CPU 计算</text><rect x="340" y="120" width="230" height="52" rx="12" class="warn"/><text x="455" y="152" text-anchor="middle" class="label">A：等待磁盘</text><rect x="570" y="120" width="170" height="52" rx="12" class="accent"/><text x="655" y="152" text-anchor="middle" class="label">A：继续计算</text><rect x="340" y="210" width="230" height="52" rx="12" class="good"/><text x="455" y="242" text-anchor="middle" class="label">B：CPU 计算</text><rect x="150" y="300" width="190" height="52" rx="12" class="accent"/><text x="245" y="332" text-anchor="middle" class="label">运行 A</text><rect x="340" y="300" width="230" height="52" rx="12" class="good"/><text x="455" y="332" text-anchor="middle" class="label">运行 B</text><rect x="570" y="300" width="170" height="52" rx="12" class="accent"/><text x="655" y="332" text-anchor="middle" class="label">运行 A</text><rect x="340" y="390" width="230" height="52" rx="12" class="warn"/><text x="455" y="422" text-anchor="middle" class="label">为 A 传输数据</text><text x="500" y="500" text-anchor="middle" class="small">关键：A 等待 I/O 时，CPU 不空转，而是切换到可运行的 B。</text></svg>