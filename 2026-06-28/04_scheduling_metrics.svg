<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">调度时间指标：四个时间点之间的距离</text><path d="M100,270 L920,270" class="line" marker-end="url(#arrow)"/><path d="M170,220 L170,320" class="line"/><text x="170" y="205" text-anchor="middle" class="label">到达 A</text><path d="M360,220 L360,320" class="line"/><text x="360" y="205" text-anchor="middle" class="label">首次运行 S</text><path d="M690,220 L690,320" class="line"/><text x="690" y="205" text-anchor="middle" class="label">完成 C</text><rect x="170" y="335" width="190" height="55" rx="12" class="warn"/><text x="265" y="368" text-anchor="middle" class="small">响应时间 S − A</text><rect x="170" y="415" width="520" height="55" rx="12" class="accent"/><text x="430" y="448" text-anchor="middle" class="small">周转时间 C − A</text><rect x="430" y="120" width="190" height="55" rx="12" class="good"/><text x="525" y="153" text-anchor="middle" class="small">CPU 服务时间 B</text><text x="500" y="505" text-anchor="middle" class="small">等待时间 = 周转时间 − 实际运行时间；带权周转时间 = 周转时间 ÷ 服务时间。</text></svg>