<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">单道程序：I/O 时 CPU 空闲</text>
<path d="M90,132 L810,132" class="line" marker-end="url(#arrow)"/><text x="820" y="138" class="small">时间</text>
<rect x="115" y="100" width="150" height="64" class="box"/><text x="190" y="139" text-anchor="middle" class="label">CPU 计算</text>
<rect x="285" y="100" width="150" height="64" class="warn"/><text x="360" y="124" text-anchor="middle" class="label">等待 I/O</text><text x="360" y="150" text-anchor="middle" class="small">CPU 空闲</text>
<rect x="455" y="100" width="150" height="64" class="box"/><text x="530" y="139" text-anchor="middle" class="label">CPU 计算</text>
<rect x="625" y="100" width="150" height="64" class="warn"/><text x="700" y="124" text-anchor="middle" class="label">等待 I/O</text><text x="700" y="150" text-anchor="middle" class="small">CPU 空闲</text>
</svg>
