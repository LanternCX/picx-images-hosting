<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">进程与线程：资源容器和执行流</text><rect x="70" y="95" width="860" height="350" rx="12" class="accent"/><text x="500" y="130" text-anchor="middle" class="label">一个进程：共享的资源容器</text><rect x="120" y="165" width="760" height="95" rx="12" class="box"/><text x="500" y="195" text-anchor="middle" class="label">共享：代码、全局数据、堆、打开文件、地址空间</text><text x="500" y="230" text-anchor="middle" class="small">同一进程内线程可直接访问这些资源</text><rect x="130" y="300" width="200" height="105" rx="12" class="good"/><text x="230" y="332" text-anchor="middle" class="label">线程 1</text><text x="230" y="363" text-anchor="middle" class="small">独立 PC / 寄存器</text><text x="230" y="388" text-anchor="middle" class="small">独立栈</text><rect x="400" y="300" width="200" height="105" rx="12" class="good"/><text x="500" y="332" text-anchor="middle" class="label">线程 2</text><text x="500" y="363" text-anchor="middle" class="small">独立 PC / 寄存器</text><text x="500" y="388" text-anchor="middle" class="small">独立栈</text><rect x="670" y="300" width="200" height="105" rx="12" class="good"/><text x="770" y="332" text-anchor="middle" class="label">线程 3</text><text x="770" y="363" text-anchor="middle" class="small">独立 PC / 寄存器</text><text x="770" y="388" text-anchor="middle" class="small">独立栈</text><text x="500" y="510" text-anchor="middle" class="small">线程切换通常比进程切换轻量，但共享地址空间也意味着一个线程的错误可能影响整个进程。</text></svg>