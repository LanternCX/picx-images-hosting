<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}</style>
<rect width="100%" height="100%" fill="white"/>
<text x="500" y="42" text-anchor="middle" class="title">地址转换题的固定流程</text>
<rect x="55" y="82" width="285" height="360" class="accent"/><text x="197.5" y="116" text-anchor="middle" class="label">分页题</text><text x="197.5" y="160" text-anchor="middle" class="small"><tspan x="197.5" dy="0">确认页大小</tspan><tspan x="197.5" dy="32">求页号和页内偏移</tspan><tspan x="197.5" dy="32">检查页号是否合法</tspan><tspan x="197.5" dy="32">查页表得页框号</tspan><tspan x="197.5" dy="32">页框号 × 页大小 + 偏移</tspan></text>
<rect x="357.5" y="82" width="285" height="360" class="good"/><text x="500" y="116" text-anchor="middle" class="label">分段题</text><text x="500" y="160" text-anchor="middle" class="small"><tspan x="500" dy="0">取段号和段内偏移</tspan><tspan x="500" dy="32">检查段号</tspan><tspan x="500" dy="32">查段表得基址和段长</tspan><tspan x="500" dy="32">检查偏移 &lt; 段长</tspan><tspan x="500" dy="32">基址 + 偏移</tspan></text>
<rect x="660" y="82" width="285" height="360" class="warn"/><text x="802.5" y="116" text-anchor="middle" class="label">段页式题</text><text x="802.5" y="160" text-anchor="middle" class="small"><tspan x="802.5" dy="0">段号查段表</tspan><tspan x="802.5" dy="32">得到该段页表地址</tspan><tspan x="802.5" dy="32">页号查页表</tspan><tspan x="802.5" dy="32">得页框号</tspan><tspan x="802.5" dy="32">页框号 × 页大小 + 偏移</tspan></text>
</svg>
