<svg xmlns="http://www.w3.org/2000/svg" width="900" height="270" viewBox="0 0 900 270">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:10}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:10}</style>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">甘特图记录每段开始和结束时刻</text>
<rect x="180" y="115" width="220" height="62" class="accent"/><text x="290" y="153" text-anchor="middle" class="label">P1</text>
<rect x="400" y="115" width="150" height="62" class="box"/><text x="475" y="153" text-anchor="middle" class="label">P2</text>
<rect x="550" y="115" width="220" height="62" class="good"/><text x="660" y="153" text-anchor="middle" class="label">P3</text>
<text x="180" y="208" text-anchor="middle" class="small">0</text><text x="400" y="208" text-anchor="middle" class="small">3</text><text x="550" y="208" text-anchor="middle" class="small">5</text><text x="770" y="208" text-anchor="middle" class="small">9</text>
</svg>
