<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">缓冲：用内存临时区吸收速度差异</text><rect x="45" y="190" width="180" height="95" rx="12" class="warn"/><text x="135" y="225" text-anchor="middle" class="label">慢速输入设备</text><text x="135" y="255" text-anchor="middle" class="small">间歇产生数据</text><rect x="310" y="155" width="170" height="165" rx="12" class="good"/><text x="395" y="195" text-anchor="middle" class="label">缓冲区 A</text><text x="395" y="230" text-anchor="middle" class="small">设备正在写入</text><text x="395" y="265" text-anchor="middle" class="small">批量积累数据</text><rect x="520" y="155" width="170" height="165" rx="12" class="accent"/><text x="605" y="195" text-anchor="middle" class="label">缓冲区 B</text><text x="605" y="230" text-anchor="middle" class="small">进程正在读取</text><text x="605" y="265" text-anchor="middle" class="small">与 A 交替使用</text><rect x="775" y="190" width="180" height="95" rx="12" class="accent"/><text x="865" y="225" text-anchor="middle" class="label">高速 CPU/进程</text><text x="865" y="255" text-anchor="middle" class="small">成批处理数据</text><path d="M225,235 L310,235" class="line" marker-end="url(#arrow)"/><path d="M690,235 L775,235" class="line" marker-end="url(#arrow)"/><path d="M480,300 L500,330 L520,300" class="line" marker-end="url(#arrow)"/><text x="500" y="355" text-anchor="middle" class="tiny">双缓冲切换</text><text x="500" y="485" text-anchor="middle" class="small">缓冲减少速度不匹配和中断频率，但数据最终仍在内存与设备之间真实传输。</text></svg>