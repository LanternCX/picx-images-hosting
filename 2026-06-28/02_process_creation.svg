<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">创建进程：先成为可调度实体，再等待 CPU</text><rect x="28" y="160" width="124" height="72" rx="12" class="accent"/><text x="90" y="190" text-anchor="middle" class="small"><tspan x="90" dy="0">申请 PCB</tspan></text><path d="M152,196 L188,196" class="line" marker-end="url(#arrow)"/><rect x="188" y="160" width="124" height="72" rx="12" class="box"/><text x="250" y="190" text-anchor="middle" class="small"><tspan x="250" dy="0">分配 PID</tspan></text><path d="M312,196 L348,196" class="line" marker-end="url(#arrow)"/><rect x="348" y="160" width="124" height="72" rx="12" class="box"/><text x="410" y="190" text-anchor="middle" class="small"><tspan x="410" dy="0">建立地址空间</tspan></text><path d="M472,196 L508,196" class="line" marker-end="url(#arrow)"/><rect x="508" y="160" width="124" height="72" rx="12" class="box"/><text x="570" y="190" text-anchor="middle" class="small"><tspan x="570" dy="0">初始化上下文</tspan></text><path d="M632,196 L668,196" class="line" marker-end="url(#arrow)"/><rect x="668" y="160" width="124" height="72" rx="12" class="accent"/><text x="730" y="190" text-anchor="middle" class="small"><tspan x="730" dy="0">加入就绪队列</tspan></text><path d="M792,196 L828,196" class="line" marker-end="url(#arrow)"/><rect x="828" y="160" width="124" height="72" rx="12" class="box"/><text x="890" y="190" text-anchor="middle" class="small"><tspan x="890" dy="0">等待调度</tspan></text><rect x="145" y="315" width="710" height="105" rx="12" class="warn"/><text x="500" y="345" text-anchor="middle" class="small"><tspan x="500" dy="0">创建 ≠ 立即运行</tspan><tspan x="500" dy="25">“分配处理器”属于之后的低级调度</tspan><tspan x="500" dy="25">因此它不是创建进程的必需步骤</tspan></text><text x="500" y="500" text-anchor="middle" class="small">新进程创建完成后通常处于就绪态：万事俱备，只差 CPU。</text></svg>