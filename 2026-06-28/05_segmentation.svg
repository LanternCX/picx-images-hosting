<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">分段地址转换：先检查段号，再检查段内偏移</text><rect x="45" y="170" width="190" height="105" rx="12" class="accent"/><text x="140" y="205" text-anchor="middle" class="label">逻辑地址</text><text x="140" y="240" text-anchor="middle" class="small">(段号 s, 偏移 d)</text><rect x="335" y="90" width="250" height="270" rx="12" class="good"/><text x="460" y="125" text-anchor="middle" class="label">段表</text><text x="370" y="175" text-anchor="start" class="small">段 0</text><rect x="430" y="150" width="135" height="42" rx="5" class="box"/><text x="497" y="177" text-anchor="middle" class="tiny">基址 1000 / 长度 400</text><text x="370" y="235" text-anchor="start" class="small">段 1</text><rect x="430" y="210" width="135" height="42" rx="5" class="box"/><text x="497" y="237" text-anchor="middle" class="tiny">基址 5000 / 长度 900</text><text x="370" y="295" text-anchor="start" class="small">段 2</text><rect x="430" y="270" width="135" height="42" rx="5" class="box"/><text x="497" y="297" text-anchor="middle" class="tiny">基址 9000 / 长度 300</text><rect x="685" y="170" width="260" height="105" rx="12" class="warn"/><text x="815" y="205" text-anchor="middle" class="label">物理地址</text><text x="815" y="240" text-anchor="middle" class="small">段基址 + d</text><path d="M235,220 L335,220" class="line" marker-end="url(#arrow)"/><text x="285.0" y="190" text-anchor="middle" class="tiny">用 s 查表</text><path d="M585,220 L685,220" class="line" marker-end="url(#arrow)"/><text x="635.0" y="190" text-anchor="middle" class="tiny">若 d &lt; 段长</text><rect x="330" y="410" width="340" height="70" rx="12" class="bad"/><text x="500" y="440" text-anchor="middle" class="label">若 d ≥ 段长：越界异常</text><text x="500" y="465" text-anchor="middle" class="tiny">段长用于保护，不参与地址相加</text></svg>