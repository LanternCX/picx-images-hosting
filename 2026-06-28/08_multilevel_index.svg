<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">多级索引：用少量直接地址兼顾小文件，用间接索引扩展大文件</text><rect x="45" y="105" width="210" height="340" rx="12" class="accent"/><text x="150" y="145" text-anchor="middle" class="label">inode / FCB</text><rect x="85" y="175" width="130" height="34" rx="4" class="box"/><text x="150" y="198" text-anchor="middle" class="tiny">直接块 0</text><rect x="85" y="223" width="130" height="34" rx="4" class="box"/><text x="150" y="246" text-anchor="middle" class="tiny">直接块 1</text><rect x="85" y="271" width="130" height="34" rx="4" class="box"/><text x="150" y="294" text-anchor="middle" class="tiny">直接块 2</text><rect x="85" y="319" width="130" height="34" rx="4" class="box"/><text x="150" y="342" text-anchor="middle" class="tiny">一级间接</text><rect x="85" y="367" width="130" height="34" rx="4" class="box"/><text x="150" y="390" text-anchor="middle" class="tiny">二级间接</text><rect x="360" y="115" width="90" height="55" rx="12" class="good"/><text x="405" y="148" text-anchor="middle" class="tiny">数据块 0</text><path d="M255,192 L360,142" class="line" marker-end="url(#arrow)"/><rect x="470" y="115" width="90" height="55" rx="12" class="good"/><text x="515" y="148" text-anchor="middle" class="tiny">数据块 1</text><path d="M255,240 L470,142" class="line" marker-end="url(#arrow)"/><rect x="580" y="115" width="90" height="55" rx="12" class="good"/><text x="625" y="148" text-anchor="middle" class="tiny">数据块 2</text><path d="M255,288 L580,142" class="line" marker-end="url(#arrow)"/><rect x="390" y="285" width="145" height="80" rx="12" class="warn"/><text x="462" y="318" text-anchor="middle" class="label">一级索引块</text><text x="462" y="345" text-anchor="middle" class="tiny">保存多个盘块号</text><path d="M255,336 L390,325" class="line" marker-end="url(#arrow)"/><rect x="620" y="270" width="90" height="50" rx="12" class="good"/><text x="665" y="300" text-anchor="middle" class="tiny">数据 3</text><path d="M535,325 L620,295" class="line" marker-end="url(#arrow)"/><rect x="730" y="270" width="90" height="50" rx="12" class="good"/><text x="775" y="300" text-anchor="middle" class="tiny">数据 4</text><path d="M535,325 L730,295" class="line" marker-end="url(#arrow)"/><rect x="840" y="270" width="90" height="50" rx="12" class="good"/><text x="885" y="300" text-anchor="middle" class="tiny">数据 5</text><path d="M535,325 L840,295" class="line" marker-end="url(#arrow)"/><rect x="390" y="410" width="145" height="70" rx="12" class="warn"/><text x="462" y="438" text-anchor="middle" class="label">二级索引块</text><text x="462" y="462" text-anchor="middle" class="tiny">指向一级索引块</text><path d="M255,384 L390,445" class="line" marker-end="url(#arrow)"/><rect x="650" y="405" width="145" height="70" rx="12" class="warn"/><text x="722" y="435" text-anchor="middle" class="label">一级索引块</text><text x="722" y="460" text-anchor="middle" class="tiny">再指向数据</text><path d="M535,445 L650,440" class="line" marker-end="url(#arrow)"/><text x="500" y="530" text-anchor="middle" class="small">访问层数越深，可表示的文件越大，但读取数据前需要更多次索引块访问。</text></svg>