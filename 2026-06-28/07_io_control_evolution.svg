<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">I/O 控制方式演进：把数据搬运工作逐步交给硬件</text><rect x="35" y="140" width="190" height="200" rx="12" class="bad"/><text x="130" y="180" text-anchor="middle" class="label">轮询</text><text x="130" y="225" text-anchor="middle" class="small"><tspan x="130" dy="0">CPU 逐字节等待/查询</tspan><tspan x="130" dy="30">CPU 参与最多</tspan></text><path d="M225,240 L280,240" class="line" marker-end="url(#arrow)"/><rect x="280" y="140" width="190" height="200" rx="12" class="warn"/><text x="375" y="180" text-anchor="middle" class="label">中断驱动</text><text x="375" y="225" text-anchor="middle" class="small"><tspan x="375" dy="0">设备完成后中断 CPU</tspan><tspan x="375" dy="30">不必持续等待</tspan></text><path d="M470,240 L525,240" class="line" marker-end="url(#arrow)"/><rect x="525" y="140" width="190" height="200" rx="12" class="good"/><text x="620" y="180" text-anchor="middle" class="label">DMA</text><text x="620" y="225" text-anchor="middle" class="small"><tspan x="620" dy="0">控制器成块搬运</tspan><tspan x="620" dy="30">每块完成再中断</tspan></text><path d="M715,240 L770,240" class="line" marker-end="url(#arrow)"/><rect x="770" y="140" width="190" height="200" rx="12" class="accent"/><text x="865" y="180" text-anchor="middle" class="label">通道</text><text x="865" y="225" text-anchor="middle" class="small"><tspan x="865" dy="0">专用处理器执行 I/O 程序</tspan><tspan x="865" dy="30">CPU 参与最少</tspan></text><path d="M130,405 L865,405" class="line" marker-end="url(#arrow)"/><text x="500" y="390" text-anchor="middle" class="label">CPU 参与程度逐渐降低，硬件自治程度逐渐提高</text><text x="500" y="500" text-anchor="middle" class="small">演进的核心不是“是否有中断”，而是 CPU 是否需要亲自搬运每个字符/数据块。</text></svg>