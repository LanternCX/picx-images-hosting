<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<rect width="100%" height="100%" fill="white"/>
<text x="480" y="42" text-anchor="middle" class="title">内存分配方式的整体关系</text>
<rect x="150" y="90" width="260" height="64" class="accent"/><text x="280" y="128" text-anchor="middle" class="label">连续分配</text>
<path d="M280,154 L200,215" class="line"/><path d="M280,154 L360,215" class="line"/>
<rect x="70" y="215" width="260" height="62" class="box"/><text x="200" y="240" text-anchor="middle" class="label">固定分区</text><text x="200" y="264" text-anchor="middle" class="small">简单，内碎片</text>
<rect x="230" y="300" width="260" height="62" class="warn"/><text x="360" y="325" text-anchor="middle" class="label">动态分区</text><text x="360" y="349" text-anchor="middle" class="small">灵活，外碎片</text>
<rect x="550" y="90" width="260" height="64" class="good"/><text x="680" y="128" text-anchor="middle" class="label">离散分配</text>
<path d="M680,154 L565,215" class="line"/><path d="M680,154 L680,215" class="line"/><path d="M680,154 L795,215" class="line"/>
<rect x="455" y="215" width="220" height="62" class="box"/><text x="565" y="240" text-anchor="middle" class="label">分页</text><text x="565" y="264" text-anchor="middle" class="small">固定大小</text>
<rect x="570" y="300" width="220" height="62" class="accent"/><text x="680" y="325" text-anchor="middle" class="label">分段</text><text x="680" y="349" text-anchor="middle" class="small">按逻辑单位</text>
<rect x="685" y="215" width="220" height="62" class="good"/><text x="795" y="240" text-anchor="middle" class="label">段页式</text><text x="795" y="264" text-anchor="middle" class="small">先分段，再分页</text>
</svg>
