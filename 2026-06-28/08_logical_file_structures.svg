<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:10}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:10}</style>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">文件的两种逻辑结构</text>
<text x="225" y="95" text-anchor="middle" class="label">无结构文件 / 字节流</text>
<rect x="75" y="125" width="80" height="56" class="accent"/><text x="115" y="160" text-anchor="middle" class="small">字节0</text>
<rect x="155" y="125" width="80" height="56" class="accent"/><text x="195" y="160" text-anchor="middle" class="small">字节1</text>
<rect x="235" y="125" width="80" height="56" class="accent"/><text x="275" y="160" text-anchor="middle" class="small">字节2</text>
<rect x="315" y="125" width="60" height="56" class="box"/><text x="345" y="160" text-anchor="middle" class="small">...</text>
<text x="675" y="95" text-anchor="middle" class="label">有结构文件 / 记录式</text>
<rect x="525" y="125" width="105" height="56" class="good"/><text x="577.5" y="160" text-anchor="middle" class="small">记录1</text>
<rect x="630" y="125" width="105" height="56" class="good"/><text x="682.5" y="160" text-anchor="middle" class="small">记录2</text>
<rect x="735" y="125" width="105" height="56" class="good"/><text x="787.5" y="160" text-anchor="middle" class="small">记录3</text>
</svg>
