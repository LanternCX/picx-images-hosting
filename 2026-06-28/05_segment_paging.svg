<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">段页式地址转换：段表找到页表，页表找到页框</text><rect x="30" y="190" width="190" height="95" rx="12" class="accent"/><text x="125" y="220" text-anchor="middle" class="label">逻辑地址</text><text x="125" y="252" text-anchor="middle" class="small">s | p | d</text><rect x="290" y="100" width="190" height="100" rx="12" class="good"/><text x="385" y="137" text-anchor="middle" class="label">段表</text><text x="385" y="168" text-anchor="middle" class="small">段 s → 页表地址</text><rect x="290" y="320" width="190" height="100" rx="12" class="good"/><text x="385" y="357" text-anchor="middle" class="label">该段的页表</text><text x="385" y="388" text-anchor="middle" class="small">页 p → 页框 f</text><rect x="575" y="190" width="190" height="95" rx="12" class="box"/><text x="670" y="220" text-anchor="middle" class="label">页框 f + 偏移 d</text><text x="670" y="252" text-anchor="middle" class="small">形成物理地址</text><rect x="830" y="190" width="140" height="95" rx="12" class="accent"/><text x="900" y="220" text-anchor="middle" class="label">主存</text><text x="900" y="252" text-anchor="middle" class="small">访问数据</text><path d="M220,220 L290,150" class="line" marker-end="url(#arrow)"/><text x="255.0" y="155" text-anchor="middle" class="tiny">段号 s</text><path d="M385,200 L385,320" class="line" marker-end="url(#arrow)"/><text x="465" y="265" text-anchor="middle" class="tiny">页表基址</text><path d="M480,370 L575,235" class="line" marker-end="url(#arrow)"/><text x="527.5" y="310" text-anchor="middle" class="tiny">页号 p</text><path d="M765,235 L830,235" class="line" marker-end="url(#arrow)"/><text x="500" y="500" text-anchor="middle" class="small">地址层次是“段 → 段内页 → 页内偏移”，兼顾逻辑组织与离散分配。</text></svg>