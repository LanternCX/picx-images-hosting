<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">一次 read 的完整路径：从文件描述符到设备 I/O</text><rect x="13" y="160" width="104" height="92" rx="12" class="accent"/><text x="65" y="193" text-anchor="middle" class="tiny"><tspan x="65" dy="0">文件描述符</tspan></text><path d="M117,206 L138,206" class="line" marker-end="url(#arrow)"/><rect x="138" y="160" width="104" height="92" rx="12" class="box"/><text x="190" y="193" text-anchor="middle" class="tiny"><tspan x="190" dy="0">进程打开表</tspan></text><path d="M242,206 L263,206" class="line" marker-end="url(#arrow)"/><rect x="263" y="160" width="104" height="92" rx="12" class="box"/><text x="315" y="193" text-anchor="middle" class="tiny"><tspan x="315" dy="0">系统打开表</tspan></text><path d="M367,206 L388,206" class="line" marker-end="url(#arrow)"/><rect x="388" y="160" width="104" height="92" rx="12" class="good"/><text x="440" y="193" text-anchor="middle" class="tiny"><tspan x="440" dy="0">FCB</tspan><tspan x="440" dy="20">inode</tspan></text><path d="M492,206 L513,206" class="line" marker-end="url(#arrow)"/><rect x="513" y="160" width="104" height="92" rx="12" class="box"/><text x="565" y="193" text-anchor="middle" class="tiny"><tspan x="565" dy="0">逻辑块号</tspan></text><path d="M617,206 L638,206" class="line" marker-end="url(#arrow)"/><rect x="638" y="160" width="104" height="92" rx="12" class="good"/><text x="690" y="193" text-anchor="middle" class="tiny"><tspan x="690" dy="0">物理盘块</tspan></text><path d="M742,206 L763,206" class="line" marker-end="url(#arrow)"/><rect x="763" y="160" width="104" height="92" rx="12" class="box"/><text x="815" y="193" text-anchor="middle" class="tiny"><tspan x="815" dy="0">设备驱动</tspan></text><path d="M867,206 L888,206" class="line" marker-end="url(#arrow)"/><rect x="888" y="160" width="104" height="92" rx="12" class="accent"/><text x="940" y="193" text-anchor="middle" class="tiny"><tspan x="940" dy="0">磁盘/SSD</tspan></text><rect x="170" y="345" width="660" height="90" rx="12" class="muted"/><text x="500" y="378" text-anchor="middle" class="label">读取完成后：数据进入页缓存/缓冲区，再复制或映射给用户进程</text><text x="500" y="408" text-anchor="middle" class="small">当前文件偏移随读取推进</text><text x="500" y="500" text-anchor="middle" class="small">文件管理负责“哪个盘块”，设备管理负责“怎样把盘块读进内存”。</text></svg>