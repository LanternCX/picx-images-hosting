<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.tiny{font-size:13px}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}
.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}
.line{stroke:#334155;stroke-width:2.2;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:7 6;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500" y="42" text-anchor="middle" class="title">缺页中断处理流程</text><rect x="55" y="115" width="115" height="82" class="box"/><text x="112.5" y="148.0" text-anchor="middle" dominant-baseline="middle" class="label">访问逻辑地址</text><text x="112.5" y="173.0" text-anchor="middle" dominant-baseline="middle" class="small">MMU查页表</text><path d="M170,156 L190,156" class="line" marker-end="url(#arrow)"/><rect x="190" y="115" width="115" height="82" class="warn"/><text x="247.5" y="148.0" text-anchor="middle" dominant-baseline="middle" class="label">存在位=0</text><text x="247.5" y="173.0" text-anchor="middle" dominant-baseline="middle" class="small">产生缺页异常</text><path d="M305,156 L325,156" class="line" marker-end="url(#arrow)"/><rect x="325" y="115" width="115" height="82" class="box"/><text x="382.5" y="148.0" text-anchor="middle" dominant-baseline="middle" class="label">检查合法性</text><text x="382.5" y="173.0" text-anchor="middle" dominant-baseline="middle" class="small">非法则终止</text><path d="M440,156 L460,156" class="line" marker-end="url(#arrow)"/><rect x="460" y="115" width="115" height="82" class="box"/><text x="517.5" y="148.0" text-anchor="middle" dominant-baseline="middle" class="label">寻找页框</text><text x="517.5" y="173.0" text-anchor="middle" dominant-baseline="middle" class="small">有空闲直接用</text><path d="M575,156 L595,156" class="line" marker-end="url(#arrow)"/><rect x="595" y="115" width="115" height="82" class="warn"/><text x="652.5" y="148.0" text-anchor="middle" dominant-baseline="middle" class="label">必要时置换</text><text x="652.5" y="173.0" text-anchor="middle" dominant-baseline="middle" class="small">脏页先写回</text><path d="M710,156 L730,156" class="line" marker-end="url(#arrow)"/><rect x="730" y="115" width="115" height="82" class="box"/><text x="787.5" y="148.0" text-anchor="middle" dominant-baseline="middle" class="label">从外存调页</text><text x="787.5" y="173.0" text-anchor="middle" dominant-baseline="middle" class="small">更新页表/TLB</text><path d="M845,156 L865,156" class="line" marker-end="url(#arrow)"/><rect x="865" y="115" width="115" height="82" class="good"/><text x="922.5" y="148.0" text-anchor="middle" dominant-baseline="middle" class="label">重新执行指令</text><text x="922.5" y="173.0" text-anchor="middle" dominant-baseline="middle" class="small">从断点重启</text><text x="500" y="275" text-anchor="middle" class="small">注意：缺页发生在一条指令执行过程中；处理完成后通常重新执行引发缺页的那条指令</text><text x="500" y="315" text-anchor="middle" class="small">“淘汰页面”不是必然步骤：若有空闲页框，就无需置换</text></svg>