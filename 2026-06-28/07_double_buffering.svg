<svg xmlns="http://www.w3.org/2000/svg" width="920" height="320" viewBox="0 0 920 320">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.line{stroke:#334155;stroke-width:2.2;fill:none}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<rect width="100%" height="100%" fill="white"/>
<text x="460" y="42" text-anchor="middle" class="title">双缓冲：设备和进程交替并行</text>
<rect x="70" y="95" width="190" height="58" class="accent"/><text x="165" y="131" text-anchor="middle" class="label">设备填充缓冲1</text>
<rect x="660" y="95" width="190" height="58" class="good"/><text x="755" y="131" text-anchor="middle" class="label">进程处理缓冲2</text>
<rect x="70" y="205" width="190" height="58" class="accent"/><text x="165" y="241" text-anchor="middle" class="label">设备填充缓冲2</text>
<rect x="660" y="205" width="190" height="58" class="good"/><text x="755" y="241" text-anchor="middle" class="label">进程处理缓冲1</text>
<path d="M260,124 L660,124" class="line" marker-end="url(#arrow)"/><path d="M260,234 L660,234" class="line" marker-end="url(#arrow)"/>
<text x="460" y="176" text-anchor="middle" class="small">两个缓冲区轮换，减少双方等待</text>
</svg>
