<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">文件抽象：名称和元数据把应用与磁盘块隔离开</text><rect x="55" y="140" width="210" height="190" rx="12" class="accent"/><text x="160" y="180" text-anchor="middle" class="label">应用看到的文件</text><text x="160" y="220" text-anchor="middle" class="label">report.md</text><text x="160" y="255" text-anchor="middle" class="small">按字节/记录读写</text><text x="160" y="285" text-anchor="middle" class="small">无需知道磁盘位置</text><rect x="385" y="110" width="230" height="250" rx="12" class="good"/><text x="500" y="150" text-anchor="middle" class="label">FCB / inode</text><rect x="430" y="180" width="140" height="32" rx="5" class="box"/><text x="500" y="202" text-anchor="middle" class="tiny">大小与类型</text><rect x="430" y="222" width="140" height="32" rx="5" class="box"/><text x="500" y="244" text-anchor="middle" class="tiny">权限与时间</text><rect x="430" y="264" width="140" height="32" rx="5" class="box"/><text x="500" y="286" text-anchor="middle" class="tiny">数据块位置</text><rect x="430" y="306" width="140" height="32" rx="5" class="box"/><text x="500" y="328" text-anchor="middle" class="tiny">链接计数</text><rect x="735" y="140" width="210" height="190" rx="12" class="warn"/><text x="840" y="180" text-anchor="middle" class="label">磁盘数据块</text><rect x="770" y="220" width="60" height="42" rx="4" class="box"/><text x="800" y="247" text-anchor="middle" class="small">8</text><rect x="845" y="220" width="60" height="42" rx="4" class="box"/><text x="875" y="247" text-anchor="middle" class="small">21</text><rect x="770" y="275" width="60" height="42" rx="4" class="box"/><text x="800" y="302" text-anchor="middle" class="small">5</text><rect x="845" y="275" width="60" height="42" rx="4" class="box"/><text x="875" y="302" text-anchor="middle" class="small">42</text><path d="M265,235 L385,235" class="line" marker-end="url(#arrow)"/><text x="325.0" y="205" text-anchor="middle" class="tiny">按名查目录</text><path d="M615,235 L735,235" class="line" marker-end="url(#arrow)"/><text x="675.0" y="205" text-anchor="middle" class="tiny">映射到盘块</text><text x="500" y="470" text-anchor="middle" class="small">文件系统提供“按名存取”的稳定抽象；数据可移动，应用仍通过同一文件名访问。</text></svg>