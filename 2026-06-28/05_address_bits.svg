<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:18px;font-weight:600}.small{font-size:15px}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:10}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:10}</style>
<rect width="100%" height="100%" fill="white"/>
<text x="450" y="42" text-anchor="middle" class="title">分页地址中的页号与页内偏移</text>
<rect x="140" y="110" width="260" height="70" class="accent"/><text x="270" y="139" text-anchor="middle" class="label">页号</text><text x="270" y="165" text-anchor="middle" class="small">p 位</text>
<rect x="400" y="110" width="360" height="70" class="good"/><text x="580" y="139" text-anchor="middle" class="label">页内偏移</text><text x="580" y="165" text-anchor="middle" class="small">m - p 位</text>
<text x="450" y="220" text-anchor="middle" class="small">页大小 = 2^(m-p) B；最多页数 = 2^p</text>
</svg>
