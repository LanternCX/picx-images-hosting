<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">临界区互斥：同一时刻只允许一个进程进入</text><rect x="385" y="155" width="230" height="190" rx="12" class="warn"/><text x="500" y="195" text-anchor="middle" class="label">共享变量 / 临界资源</text><text x="500" y="230" text-anchor="middle" class="small">例如余额、队列、打印机</text><rect x="50" y="135" width="170" height="75" rx="12" class="accent"/><text x="135" y="178" text-anchor="middle" class="label">进程 P1</text><rect x="780" y="135" width="170" height="75" rx="12" class="accent"/><text x="865" y="178" text-anchor="middle" class="label">进程 P2</text><path d="M220,172 L385,210" class="line" marker-end="url(#arrow)"/><text x="302.5" y="150" text-anchor="middle" class="tiny">进入区申请锁</text><path d="M780,172 L670,172 L670,285 L615,285" class="line" marker-end="url(#arrow)"/><text x="710" y="150" text-anchor="middle" class="tiny">若忙则等待</text><rect x="110" y="335" width="250" height="85" rx="12" class="good"/><text x="235" y="366" text-anchor="middle" class="small"><tspan x="235" dy="0">P1 获得锁</tspan><tspan x="235" dy="22">执行临界区</tspan><tspan x="235" dy="22">离开时释放锁</tspan></text><rect x="640" y="335" width="250" height="85" rx="12" class="muted"/><text x="765" y="366" text-anchor="middle" class="small"><tspan x="765" dy="0">P2 未获得锁</tspan><tspan x="765" dy="22">不能访问共享资源</tspan><tspan x="765" dy="22">等待或阻塞</tspan></text><text x="500" y="500" text-anchor="middle" class="small">互斥保护的是“访问共享资源的代码段”，不是要求整个进程从头到尾串行。</text></svg>