<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
<style>text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}.title{font-size:26px;font-weight:700}.label{font-size:17px;font-weight:600}.small{font-size:14px}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:12}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}</style>
<rect width="100%" height="100%" fill="white"/>
<text x="500" y="42" text-anchor="middle" class="title">文件管理题的判断层次</text>
<rect x="70" y="85" width="390" height="62" class="accent"/><text x="265" y="112" text-anchor="middle" class="label">用户看到的内容组织？</text><text x="265" y="135" text-anchor="middle" class="small">逻辑结构</text>
<rect x="540" y="85" width="390" height="62" class="box"/><text x="735" y="112" text-anchor="middle" class="label">数据块怎样放在磁盘？</text><text x="735" y="135" text-anchor="middle" class="small">物理结构</text>
<rect x="70" y="175" width="390" height="62" class="good"/><text x="265" y="202" text-anchor="middle" class="label">文件名怎样定位控制信息？</text><text x="265" y="225" text-anchor="middle" class="small">目录和 FCB</text>
<rect x="540" y="175" width="390" height="62" class="warn"/><text x="735" y="202" text-anchor="middle" class="label">打开后怎样快速访问？</text><text x="735" y="225" text-anchor="middle" class="small">打开文件表和描述符</text>
<rect x="70" y="265" width="390" height="62" class="box"/><text x="265" y="292" text-anchor="middle" class="label">哪些盘块空闲？</text><text x="265" y="315" text-anchor="middle" class="small">空闲空间管理</text>
<rect x="540" y="265" width="390" height="62" class="accent"/><text x="735" y="292" text-anchor="middle" class="label">大文件怎样找到数据块？</text><text x="735" y="315" text-anchor="middle" class="small">多级索引</text>
<rect x="305" y="355" width="390" height="62" class="good"/><text x="500" y="382" text-anchor="middle" class="label">谁能读写？</text><text x="500" y="405" text-anchor="middle" class="small">保护与访问控制</text>
</svg>
