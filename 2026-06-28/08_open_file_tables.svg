<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">open 之后：文件描述符连接两级打开文件表</text><rect x="35" y="170" width="180" height="130" rx="12" class="accent"/><text x="125" y="205" text-anchor="middle" class="label">用户进程</text><text x="125" y="240" text-anchor="middle" class="label">fd = 3</text><text x="125" y="270" text-anchor="middle" class="small">read(fd, ...)</text><rect x="300" y="105" width="220" height="270" rx="12" class="good"/><text x="410" y="145" text-anchor="middle" class="label">进程打开文件表</text><rect x="335" y="180" width="150" height="38" rx="5" class="box"/><text x="410" y="205" text-anchor="middle" class="tiny">fd 0 → 表项 A</text><rect x="335" y="235" width="150" height="38" rx="5" class="box"/><text x="410" y="260" text-anchor="middle" class="tiny">fd 1 → 表项 B</text><rect x="335" y="290" width="150" height="38" rx="5" class="box"/><text x="410" y="315" text-anchor="middle" class="tiny">fd 3 → 系统项 7</text><rect x="610" y="105" width="330" height="270" rx="12" class="warn"/><text x="775" y="145" text-anchor="middle" class="label">系统打开文件表</text><rect x="655" y="175" width="240" height="34" rx="5" class="box"/><text x="775" y="198" text-anchor="middle" class="tiny">系统项 7：当前偏移 4096</text><rect x="655" y="222" width="240" height="34" rx="5" class="box"/><text x="775" y="245" text-anchor="middle" class="tiny">打开方式：只读</text><rect x="655" y="269" width="240" height="34" rx="5" class="box"/><text x="775" y="292" text-anchor="middle" class="tiny">引用计数：2</text><rect x="655" y="316" width="240" height="34" rx="5" class="box"/><text x="775" y="339" text-anchor="middle" class="tiny">指向 inode/FCB</text><path d="M215,235 L300,235" class="line" marker-end="url(#arrow)"/><text x="257.5" y="205" text-anchor="middle" class="tiny">fd 索引</text><path d="M520,265 L610,265" class="line" marker-end="url(#arrow)"/><text x="565.0" y="235" text-anchor="middle" class="tiny">共享系统项</text><text x="500" y="485" text-anchor="middle" class="small">文件描述符只是进程内的小整数；真正的文件状态和元数据由内核表项维护。</text></svg>