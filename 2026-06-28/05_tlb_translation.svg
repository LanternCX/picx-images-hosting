<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">带 TLB 的分页地址转换：先查快表，再决定是否访问页表</text><rect x="40" y="180" width="180" height="90" rx="12" class="accent"/><text x="130" y="215" text-anchor="middle" class="label">逻辑地址</text><text x="130" y="245" text-anchor="middle" class="small">页号 p + 偏移 d</text><rect x="310" y="100" width="190" height="100" rx="12" class="good"/><text x="405" y="140" text-anchor="middle" class="label">TLB 快表</text><text x="405" y="170" text-anchor="middle" class="small">近期页号→页框号</text><rect x="310" y="300" width="190" height="100" rx="12" class="warn"/><text x="405" y="340" text-anchor="middle" class="label">内存中的页表</text><text x="405" y="370" text-anchor="middle" class="small">完整映射关系</text><rect x="610" y="180" width="170" height="90" rx="12" class="box"/><text x="695" y="215" text-anchor="middle" class="label">页框号 f</text><text x="695" y="245" text-anchor="middle" class="small">与 d 组合</text><rect x="830" y="180" width="130" height="90" rx="12" class="accent"/><text x="895" y="215" text-anchor="middle" class="label">物理地址</text><text x="895" y="245" text-anchor="middle" class="tiny">f × 页长 + d</text><path d="M220,215 L310,150" class="line" marker-end="url(#arrow)"/><text x="265.0" y="155" text-anchor="middle" class="tiny">先查</text><path d="M220,235 L260,235 L260,350 L310,350" class="line" marker-end="url(#arrow)"/><text x="245" y="300" text-anchor="middle" class="tiny">TLB 未命中</text><path d="M500,150 L610,215" class="line" marker-end="url(#arrow)"/><text x="555.0" y="160" text-anchor="middle" class="tiny">命中</text><path d="M500,350 L610,235" class="line" marker-end="url(#arrow)"/><text x="555.0" y="315" text-anchor="middle" class="tiny">查页表后得到</text><path d="M780,225 L830,225" class="line" marker-end="url(#arrow)"/><text x="500" y="500" text-anchor="middle" class="small">TLB 命中时可省去访问内存页表的一次访存；TLB 本身不是页表的替代品。</text></svg>