<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560"><style>
text{font-family:"Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.label{font-size:19px;font-weight:650}.small{font-size:15px}.tiny{font-size:13px}.mono{font-size:15px;font-family:Menlo,Consolas,monospace}
.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.accent{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.good{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.muted{fill:#f1f5f9;stroke:#64748b;stroke-width:1.7}
.line{stroke:#334155;stroke-width:2.4;fill:none}.thin{stroke:#64748b;stroke-width:1.6;fill:none}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:8 7;fill:none}
</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/></marker></defs><rect width="100%" height="100%" fill="white"/><text x="500.0" y="40" text-anchor="middle" class="title">中断处理：暂存现场、处理事件、恢复执行</text><circle cx="85" cy="220" r="62" class="accent"/><text x="85" y="212" text-anchor="middle" class="small"><tspan x="85" dy="0">用户程序运行</tspan></text><path d="M147,220 L183,220" class="line" marker-end="url(#arrow)"/><circle cx="245" cy="220" r="62" class="warn"/><text x="245" y="212" text-anchor="middle" class="small"><tspan x="245" dy="0">硬件产生中断</tspan></text><path d="M307,220 L343,220" class="line" marker-end="url(#arrow)"/><circle cx="405" cy="220" r="62" class="box"/><text x="405" y="212" text-anchor="middle" class="small"><tspan x="405" dy="0">保存断点</tspan><tspan x="405" dy="21">切内核态</tspan></text><path d="M467,220 L503,220" class="line" marker-end="url(#arrow)"/><circle cx="565" cy="220" r="62" class="box"/><text x="565" y="212" text-anchor="middle" class="small"><tspan x="565" dy="0">查中断向量</tspan></text><path d="M627,220 L663,220" class="line" marker-end="url(#arrow)"/><circle cx="725" cy="220" r="62" class="good"/><text x="725" y="212" text-anchor="middle" class="small"><tspan x="725" dy="0">执行中断处理程序</tspan></text><path d="M787,220 L823,220" class="line" marker-end="url(#arrow)"/><circle cx="885" cy="220" r="62" class="accent"/><text x="885" y="212" text-anchor="middle" class="small"><tspan x="885" dy="0">恢复现场</tspan><tspan x="885" dy="21">返回</tspan></text><rect x="155" y="355" width="690" height="105" rx="12" class="muted"/><text x="500" y="386" text-anchor="middle" class="small"><tspan x="500" dy="0">被中断程序并没有消失</tspan><tspan x="500" dy="25">程序计数器、寄存器等现场被保存</tspan><tspan x="500" dy="25">处理完成后可从原位置继续</tspan></text><text x="500" y="515" text-anchor="middle" class="small">外部中断通常由硬件异步触发；异常和系统调用也会进入内核，但来源不同。</text></svg>